<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель YomuBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 30px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; }
        .item-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">⛩️ Управление контентом</h2>
        
        <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="content-tab" data-bs-toggle="tab" data-bs-target="#content" type="button" role="tab">Слова/Кандзи</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="grammar-tab" data-bs-toggle="tab" data-bs-target="#grammar" type="button" role="tab">Грамматика</button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <!-- TAB: CONTENT -->
            <div class="tab-pane fade show active" id="content" role="tabpanel">
                <div class="card p-4 mb-4">
                    <h4>Добавить слово/кандзи</h4>
                    <form id="addItemForm">
                        <div class="mb-3">
                            <label class="form-label">Категория</label>
                            <select class="form-select" name="category" required>
                                <option value="kanji_n5">Кандзи N5</option>
                                <option value="words_n5">Слова N5</option>
                                <option value="kanji_n4">Кандзи N4</option>
                                <option value="words_n4">Слова N4</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Группа (ключ)</label>
                            <input type="text" class="form-control" name="group_key" placeholder="naprimer: n5_nature" required>
                            <div class="form-text">Если группа новая, она будет создана автоматически.</div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Символ / Слово</label>
                                <input type="text" class="form-control" name="char" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Чтение (кана)</label>
                                <input type="text" class="form-control" name="reading">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Значение (перевод)</label>
                            <input type="text" class="form-control" name="meaning">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Подсказка</label>
                            <input type="text" class="form-control" name="hint">
                        </div>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </form>
                </div>
            </div>

            <!-- TAB: GRAMMAR -->
            <div class="tab-pane fade" id="grammar" role="tabpanel">
                <div class="card p-4 mb-4">
                    <h4>Добавить правило</h4>
                    <form id="addGrammarForm">
                        <div class="mb-3">
                            <label class="form-label">Уровень</label>
                            <select class="form-select" name="level" required>
                                <option value="N5">N5</option>
                                <option value="N4">N4</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Заголовок</label>
                            <input type="text" class="form-control" name="title" placeholder="〜は (wa)" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Структура</label>
                            <input type="text" class="form-control" name="structure" placeholder="A wa B desu">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            <textarea class="form-control" name="description" rows="3" required></textarea>
                        </div>
                        
                        <hr>
                        <h5>Пример 1</h5>
                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <input type="text" class="form-control" name="ex1_jp" placeholder="Японский" required>
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="text" class="form-control" name="ex1_reading" placeholder="Чтение">
                            </div>
                            <div class="col-md-4 mb-2">
                                <input type="text" class="form-control" name="ex1_tr" placeholder="Перевод" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary mt-3">Сохранить правило</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="card p-4 mb-4">
            <label class="form-label">Секретный ключ админа</label>
            <input type="password" class="form-control" id="adminKey" required>
        </div>

        <div id="statusMessage" class="alert d-none"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const adminKeyEl = document.getElementById('adminKey');
        const statusEl = document.getElementById('statusMessage');

        async function sendData(url, data) {
            const key = adminKeyEl.value;
            if(!key) {
                alert('Введите ключ админа!');
                return;
            }
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': key },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.success) {
                    statusEl.className = 'alert alert-success';
                    statusEl.textContent = '✅ Успешно сохранено!';
                    return true;
                } else {
                    statusEl.className = 'alert alert-danger';
                    statusEl.textContent = '❌ Ошибка: ' + (result.error || 'Unknown');
                    return false;
                }
            } catch (e) {
                statusEl.className = 'alert alert-danger';
                statusEl.textContent = '❌ Ошибка сети';
                return false;
            } finally {
                statusEl.classList.remove('d-none');
            }
        }

        document.getElementById('addItemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target).entries());
            if(await sendData('/api/admin/content', formData)) {
                e.target.reset();
            }
        });

        document.getElementById('addGrammarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = {
                level: fd.get('level'),
                title: fd.get('title'),
                structure: fd.get('structure'),
                description: fd.get('description'),
                examples: []
            };
            
            // Собираем пример (пока один для простоты)
            if(fd.get('ex1_jp')) {
                data.examples.push({
                    japanese: fd.get('ex1_jp'),
                    reading: fd.get('ex1_reading'),
                    translation: fd.get('ex1_tr')
                });
            }
            
            if(await sendData('/api/admin/grammar', data)) {
                e.target.reset();
            }
        });
    </script>
</body>
</html>
