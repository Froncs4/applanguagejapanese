<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель YomuBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 30px; }
        .card { margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; }
        .item-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">⛩️ Управление контентом</h2>
        
        <div class="card p-4 mb-4">
            <h4>Добавить новый элемент</h4>
            <form id="addItemForm">
                <div class="mb-3">
                    <label class="form-label">Категория</label>
                    <select class="form-select" name="category" required>
                        <option value="kanji_n5">Кандзи N5</option>
                        <option value="words_n5">Слова N5</option>
                        <option value="kanji_n4">Кандзи N4</option>
                        <option value="words_n4">Слова N4</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Группа (ключ)</label>
                    <input type="text" class="form-control" name="group_key" placeholder="naprimer: n5_nature" required>
                    <div class="form-text">Если группа новая, она будет создана автоматически.</div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Символ / Слово</label>
                        <input type="text" class="form-control" name="char" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Чтение (кана)</label>
                        <input type="text" class="form-control" name="reading">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Значение (перевод)</label>
                    <input type="text" class="form-control" name="meaning">
                </div>
                <div class="mb-3">
                    <label class="form-label">Подсказка</label>
                    <input type="text" class="form-control" name="hint">
                </div>
                <div class="mb-3">
                    <label class="form-label">Секретный ключ админа</label>
                    <input type="password" class="form-control" id="adminKey" required>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </form>
        </div>

        <div id="statusMessage" class="alert d-none"></div>
    </div>

    <script>
        document.getElementById('addItemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            const key = document.getElementById('adminKey').value;

            // Удаляем ключ из данных, он пойдет в заголовок
            delete data['adminKey'];

            try {
                const response = await fetch('/api/admin/content', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Key': key
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const msgEl = document.getElementById('statusMessage');
                
                if (result.success) {
                    msgEl.className = 'alert alert-success';
                    msgEl.textContent = '✅ Успешно добавлено!';
                    form.reset();
                    document.getElementById('adminKey').value = key; // Вернуть ключ
                } else {
                    msgEl.className = 'alert alert-danger';
                    msgEl.textContent = '❌ Ошибка: ' + (result.error || 'Неизвестная ошибка');
                }
                msgEl.classList.remove('d-none');
            } catch (err) {
                alert('Ошибка сети');
            }
        });
    </script>
</body>
</html>
