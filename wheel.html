<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ... (весь CSS без изменений, как в исходном файле) ... */
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1>🎡 КОЛЕСО ФОРТУНЫ</h1>
        <p class="subtitle">Испытай удачу и выиграй XP!</p>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="center-circle">🎯</div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spin()">
            🎲 КРУТИТЬ!
        </button>
        
        <div class="result" id="result">
            <div class="result-xp" id="resultXp">+100 XP</div>
            <div class="result-text">Награда начислена!</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const prizes = [
            { value: 10, label: '10', color: '#e74c3c' },
            { value: 25, label: '25', color: '#9b59b6' },
            { value: 50, label: '50', color: '#3498db' },
            { value: 100, label: '100', color: '#2ecc71' },
            { value: 15, label: '15', color: '#e67e22' },
            { value: 75, label: '75', color: '#1abc9c' },
            { value: 30, label: '30', color: '#f39c12' },
            { value: 200, label: '200', color: '#ff6b9d' }
        ];

        let isSpinning = false;
        let currentRotation = 0;

        // Новая функция отправки
        function sendResult(type, score) {
            const data = {
                type: type,
                score: score,
                initData: tg.initData
            };
            tg.sendData(JSON.stringify(data));
        }

        function createWheel() {
            const wheel = document.getElementById('wheel');
            const segmentAngle = 360 / prizes.length;
            
            let svgContent = `<svg viewBox="0 0 100 100" style="width:100%;height:100%;border-radius:50%;">`;
            
            prizes.forEach((prize, i) => {
                const startAngle = i * segmentAngle - 90;
                const endAngle = startAngle + segmentAngle;
                
                const startRad = (startAngle * Math.PI) / 180;
                const endRad = (endAngle * Math.PI) / 180;
                
                const x1 = 50 + 50 * Math.cos(startRad);
                const y1 = 50 + 50 * Math.sin(startRad);
                const x2 = 50 + 50 * Math.cos(endRad);
                const y2 = 50 + 50 * Math.sin(endRad);
                
                const largeArc = segmentAngle > 180 ? 1 : 0;
                
                svgContent += `
                    <path d="M 50 50 L ${x1} ${y1} A 50 50 0 ${largeArc} 1 ${x2} ${y2} Z" 
                          fill="${prize.color}"/>
                `;
                
                const textAngle = startAngle + segmentAngle / 2;
                const textRad = (textAngle * Math.PI) / 180;
                const textX = 50 + 32 * Math.cos(textRad);
                const textY = 50 + 32 * Math.sin(textRad);
                
                svgContent += `
                    <text x="${textX}" y="${textY}" 
                          fill="white" 
                          font-size="8" 
                          font-weight="bold"
                          text-anchor="middle" 
                          dominant-baseline="middle"
                          transform="rotate(${textAngle + 90}, ${textX}, ${textY})">
                        ${prize.label}
                    </text>
                `;
            });
            
            svgContent += `</svg>`;
            wheel.innerHTML = svgContent;
        }

        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            btn.textContent = '🎰 Крутится...';
            
            document.getElementById('result').classList.remove('show');
            
            const prizeIndex = Math.floor(Math.random() * prizes.length);
            const prize = prizes[prizeIndex];
            
            const segmentAngle = 360 / prizes.length;
            const targetAngle = 360 - (prizeIndex * segmentAngle + segmentAngle / 2);
            
            const spins = 5 + Math.random() * 3;
            const finalRotation = currentRotation + (spins * 360) + targetAngle - (currentRotation % 360);
            
            currentRotation = finalRotation;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${finalRotation}deg)`;
            
            try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
            
            setTimeout(() => {
                showResult(prize.value);
                isSpinning = false;
                btn.textContent = '✅ Готово!';
                // Отправляем результат
                sendResult('wheel_reward', prize.value);
            }, 4500);
        }

        function showResult(xp) {
            const result = document.getElementById('result');
            const resultXp = document.getElementById('resultXp');
            
            resultXp.textContent = `+${xp} XP`;
            result.classList.add('show');
            
            createConfetti();
            
            try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}
        }

        function createConfetti() {
            const colors = ['#f093fb', '#f5576c', '#ffd200', '#00d2ff', '#2ecc71', '#9b59b6'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                    confetti.style.width = (5 + Math.random() * 10) + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        createWheel();
        createParticles();
        
        document.body.style.background = tg.colorScheme === 'dark' 
            ? 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)'
            : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
    </script>
</body>
</html>
