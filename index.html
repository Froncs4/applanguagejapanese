<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japanese Learning</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            padding: 16px;
            max-width: 100%;
        }

        /* ========== HEADER ========== */
        .header {
            text-align: center;
            padding: 20px 16px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 0 0 24px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* ========== TABS (Alphabet) ========== */
        .tabs-container {
            margin-top: 16px;
        }

        .tabs {
            display: flex;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        /* ========== KANA GRID ========== */
        .kana-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 0 4px;
        }

        .kana-card {
            aspect-ratio: 1;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            padding: 4px;
        }

        .kana-card:active {
            transform: scale(0.95);
        }

        .kana-card.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .kana-card .char {
            font-size: 28px;
            font-weight: 500;
            line-height: 1.2;
        }

        .kana-card .reading {
            font-size: 11px;
            color: var(--tg-theme-hint-color, #999);
            margin-top: 2px;
        }

        /* ========== CARD DETAIL MODAL ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-char {
            font-size: 80px;
            margin-bottom: 16px;
            line-height: 1;
        }

        .modal-reading {
            font-size: 32px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-hint {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-btn:active {
            transform: scale(0.95);
        }

        .modal-btn.sound {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .modal-btn.close {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        /* ========== SWIPE MODE ========== */
        .swipe-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            padding-top: 30px;
        }

        .swipe-container.active {
            display: flex;
        }

        .swipe-header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 10px;
        }

        .swipe-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--tg-theme-text-color, #000);
            margin-bottom: 10px;
        }

        .swipe-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
        }

        .progress-bar {
            width: 120px;
            height: 6px;
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .swipe-cards-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 20px 0;
        }

        .swipe-card {
            position: absolute;
            width: 280px;
            height: 380px;
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            user-select: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .swipe-card.dragging {
            cursor: grabbing;
            transition: none;
        }

        .swipe-card .card-char {
            font-size: 120px;
            margin-bottom: 20px;
            line-height: 1;
        }

        .swipe-card .card-question {
            font-size: 18px;
            color: var(--tg-theme-hint-color, #999);
        }

        .swipe-card .card-answer {
            font-size: 36px;
            color: #667eea;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .swipe-card.show-answer .card-answer {
            opacity: 1;
        }

        .swipe-card.show-answer .card-question {
            display: none;
        }

        .swipe-indicators {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .indicator {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .indicator.know {
            background: #4ade80;
            color: white;
        }

        .indicator.dont-know {
            background: #f87171;
            color: white;
        }

        .swipe-hint {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #999);
            font-size: 14px;
        }

        .swipe-hint span {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* ========== QUIZ MODE ========== */
        .quiz-container {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container.active {
            display: flex;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .quiz-header h2 {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .quiz-score {
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 16px;
        }

        .quiz-score .correct {
            color: #4ade80;
        }

        .quiz-score .wrong {
            color: #f87171;
        }

        .quiz-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
        }

        .quiz-card .char {
            font-size: 100px;
            color: white;
            line-height: 1;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .quiz-option {
            padding: 18px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border: 2px solid transparent;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quiz-option:active {
            transform: scale(0.98);
        }

        .quiz-option.correct {
            background: #4ade80;
            color: white;
            border-color: #22c55e;
        }

        .quiz-option.wrong {
            background: #f87171;
            color: white;
            border-color: #ef4444;
        }

        .quiz-option.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        /* ========== GRAMMAR MODE ========== */
        .grammar-container {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        .grammar-container.active {
            display: flex;
        }

        .grammar-header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 20px;
        }

        .grammar-header h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .grammar-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .grammar-sentence {
            font-size: 28px;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .grammar-blank {
            display: inline-block;
            min-width: 60px;
            border-bottom: 3px solid #667eea;
            margin: 0 4px;
        }

        .grammar-translation {
            text-align: center;
            color: var(--tg-theme-hint-color, #999);
            font-size: 16px;
        }

        .grammar-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .grammar-option {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .grammar-option:active {
            transform: scale(0.95);
        }

        .grammar-option.correct {
            background: #4ade80;
        }

        .grammar-option.wrong {
            background: #f87171;
        }

        /* ========== RESULTS ========== */
        .results-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .results-container.active {
            display: flex;
        }

        .results-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .results-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .results-score {
            font-size: 48px;
            font-weight: 800;
            color: #667eea;
            margin-bottom: 8px;
        }

        .results-subtitle {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 30px;
        }

        .results-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* ========== LOADING ========== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hide all modes by default */
        .alphabet-container,
        .swipe-container,
        .quiz-container,
        .grammar-container,
        .results-container {
            display: none;
        }

        .alphabet-container.active,
        .swipe-container.active,
        .quiz-container.active,
        .grammar-container.active,
        .results-container.active {
            display: flex;
            flex-direction: column;
        }

        .alphabet-container.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- LOADING -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- ALPHABET MODE -->
    <div class="alphabet-container" id="alphabetMode">
        <div class="header">
            <h1>🎌 Японская Азбука</h1>
            <p>Нажми на символ для изучения</p>
            
            <!-- TABS MOVED INSIDE HEADER WITH MARGIN -->
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab active" data-tab="hiragana">Хирагана</button>
                    <button class="tab" data-tab="katakana">Катакана</button>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="kana-grid" id="kanaGrid"></div>
        </div>
    </div>

    <!-- SWIPE MODE -->
    <div class="swipe-container" id="swipeMode">
        <div class="swipe-header">
            <h2>📚 Учим карточки</h2>
            <div class="swipe-progress">
                <span id="swipeCount">0 / 10</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="swipeProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="swipe-cards-area" id="swipeArea">
            <div class="swipe-card" id="swipeCard">
                <div class="swipe-indicators">
                    <div class="indicator dont-know">Не знаю 👎</div>
                    <div class="indicator know">Знаю 👍</div>
                </div>
                <div class="card-char">あ</div>
                <div class="card-question">Нажми чтобы увидеть ответ</div>
                <div class="card-answer">a</div>
            </div>
        </div>

        <div class="swipe-hint">
            <span>👈 Не знаю &nbsp;&nbsp;|&nbsp;&nbsp; Знаю 👉</span>
        </div>
    </div>

    <!-- QUIZ MODE -->
    <div class="quiz-container" id="quizMode">
        <div class="quiz-header">
            <h2>🎯 Тест</h2>
            <div class="quiz-progress">
                <span id="quizCount">1 / 5</span>
            </div>
            <div class="quiz-score">
                <span class="correct">✓ <span id="correctCount">0</span></span>
                <span class="wrong">✗ <span id="wrongCount">0</span></span>
            </div>
        </div>

        <div class="quiz-card">
            <div class="char" id="quizChar">あ</div>
        </div>

        <div class="quiz-options" id="quizOptions"></div>
    </div>

    <!-- GRAMMAR MODE -->
    <div class="grammar-container" id="grammarMode">
        <div class="grammar-header">
            <h2>📖 Грамматика N5</h2>
            <div class="quiz-progress">
                <span id="grammarCount">1 / 5</span>
            </div>
        </div>

        <div class="grammar-card">
            <div class="grammar-sentence" id="grammarSentence">
                わたし <span class="grammar-blank"></span> がくせい です
            </div>
            <div class="grammar-translation" id="grammarTranslation">Я студент</div>
        </div>

        <div class="grammar-options" id="grammarOptions"></div>
    </div>

    <!-- RESULTS -->
    <div class="results-container" id="resultsMode">
        <div class="results-icon" id="resultsIcon">🎉</div>
        <div class="results-title" id="resultsTitle">Отлично!</div>
        <div class="results-score" id="resultsScore">5 / 5</div>
        <div class="results-subtitle" id="resultsSubtitle">Так держать!</div>
        <button class="results-btn" onclick="sendResults()">Завершить</button>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-char" id="modalChar">あ</div>
            <div class="modal-reading" id="modalReading">a</div>
            <div class="modal-hint" id="modalHint">Подсказка</div>
            <div class="modal-buttons">
                <button class="modal-btn sound" onclick="playSound()">🔊</button>
                <button class="modal-btn close" onclick="closeModal()">✕</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== INIT ====================
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Data
        const HIRAGANA = [
            {char: 'あ', reading: 'a', hint: 'Буква А с завитком'},
            {char: 'い', reading: 'i', hint: 'Две палочки'},
            {char: 'う', reading: 'u', hint: 'Похоже на У'},
            {char: 'え', reading: 'e', hint: 'Треугольник'},
            {char: 'お', reading: 'o', hint: 'Человечек'},
            {char: 'か', reading: 'ka', hint: 'Лезвие катаны'},
            {char: 'き', reading: 'ki', hint: 'Ключ'},
            {char: 'く', reading: 'ku', hint: 'Клюв птицы'},
            {char: 'け', reading: 'ke', hint: 'Кегля'},
            {char: 'こ', reading: 'ko', hint: 'Два коромысла'},
            {char: 'さ', reading: 'sa', hint: 'Самурай'},
            {char: 'し', reading: 'shi', hint: 'Рыболовный крючок'},
            {char: 'す', reading: 'su', hint: 'Сушки на верёвке'},
            {char: 'せ', reading: 'se', hint: 'Сено'},
            {char: 'そ', reading: 'so', hint: 'Соломинка'},
            {char: 'た', reading: 'ta', hint: 'Танец'},
            {char: 'ち', reading: 'chi', hint: 'Цифра 5'},
            {char: 'つ', reading: 'tsu', hint: 'Улыбка цунами'},
            {char: 'て', reading: 'te', hint: 'Телевизор'},
            {char: 'と', reading: 'to', hint: 'Торнадо'},
            {char: 'な', reading: 'na', hint: 'Узел на верёвке'},
            {char: 'に', reading: 'ni', hint: 'Нитка'},
            {char: 'ぬ', reading: 'nu', hint: 'Лапша нудл'},
            {char: 'ね', reading: 'ne', hint: 'Кошка нэко'},
            {char: 'の', reading: 'no', hint: 'Знак номера'},
            {char: 'は', reading: 'ha', hint: 'Смеётся ХА'},
            {char: 'ひ', reading: 'hi', hint: 'Хихикает'},
            {char: 'ふ', reading: 'fu', hint: 'Гора Фудзи'},
            {char: 'へ', reading: 'he', hint: 'Волна'},
            {char: 'ほ', reading: 'ho', hint: 'Холодильник'},
            {char: 'ま', reading: 'ma', hint: 'Мама'},
            {char: 'み', reading: 'mi', hint: 'Цифра 21'},
            {char: 'む', reading: 'mu', hint: 'Корова МУ'},
            {char: 'め', reading: 'me', hint: 'Глаз мэ'},
            {char: 'も', reading: 'mo', hint: 'Рыба в море'},
            {char: 'や', reading: 'ya', hint: 'Яхта'},
            {char: 'ゆ', reading: 'yu', hint: 'Юла'},
            {char: 'よ', reading: 'yo', hint: 'Йо-йо'},
            {char: 'ら', reading: 'ra', hint: 'Рамен'},
            {char: 'り', reading: 'ri', hint: 'Лента ribbon'},
            {char: 'る', reading: 'ru', hint: 'Рулон'},
            {char: 'れ', reading: 're', hint: 'Река'},
            {char: 'ろ', reading: 'ro', hint: 'Рот открыт'},
            {char: 'わ', reading: 'wa', hint: 'Ваза'},
            {char: 'を', reading: 'wo', hint: 'Ворота'},
            {char: 'ん', reading: 'n', hint: 'Звук Н'}
        ];

        const KATAKANA = [
            {char: 'ア', reading: 'a', hint: 'Похоже на А'},
            {char: 'イ', reading: 'i', hint: 'Две палочки'},
            {char: 'ウ', reading: 'u', hint: 'У с короной'},
            {char: 'エ', reading: 'e', hint: 'Этажерка'},
            {char: 'オ', reading: 'o', hint: 'О бежит'},
            {char: 'カ', reading: 'ka', hint: 'Острый угол'},
            {char: 'キ', reading: 'ki', hint: 'Ключ'},
            {char: 'ク', reading: 'ku', hint: 'Куб'},
            {char: 'ケ', reading: 'ke', hint: 'Кетчуп'},
            {char: 'コ', reading: 'ko', hint: 'Коробка'},
            {char: 'サ', reading: 'sa', hint: 'Сабля'},
            {char: 'シ', reading: 'shi', hint: 'Широкая улыбка'},
            {char: 'ス', reading: 'su', hint: 'Сундук'},
            {char: 'セ', reading: 'se', hint: 'Сэндвич'},
            {char: 'ソ', reading: 'so', hint: 'Сок'},
            {char: 'タ', reading: 'ta', hint: 'Таблица'},
            {char: 'チ', reading: 'chi', hint: 'Число'},
            {char: 'ツ', reading: 'tsu', hint: 'Цунами'},
            {char: 'テ', reading: 'te', hint: 'Телевизор'},
            {char: 'ト', reading: 'to', hint: 'Торт'},
            {char: 'ナ', reading: 'na', hint: 'Нож'},
            {char: 'ニ', reading: 'ni', hint: 'Ни (два)'},
            {char: 'ヌ', reading: 'nu', hint: 'Нудл'},
            {char: 'ネ', reading: 'ne', hint: 'Нэт'},
            {char: 'ノ', reading: 'no', hint: 'Нос'},
            {char: 'ハ', reading: 'ha', hint: 'Хата'},
            {char: 'ヒ', reading: 'hi', hint: 'Хихи'},
            {char: 'フ', reading: 'fu', hint: 'Фудзи'},
            {char: 'ヘ', reading: 'he', hint: 'Хэй'},
            {char: 'ホ', reading: 'ho', hint: 'Хор'},
            {char: 'マ', reading: 'ma', hint: 'Мама'},
            {char: 'ミ', reading: 'mi', hint: 'Ми (три)'},
            {char: 'ム', reading: 'mu', hint: 'Му'},
            {char: 'メ', reading: 'me', hint: 'Мэч'},
            {char: 'モ', reading: 'mo', hint: 'Море'},
            {char: 'ヤ', reading: 'ya', hint: 'Яхта'},
            {char: 'ユ', reading: 'yu', hint: 'Юла'},
            {char: 'ヨ', reading: 'yo', hint: 'Йо-йо'},
            {char: 'ラ', reading: 'ra', hint: 'Радио'},
            {char: 'リ', reading: 'ri', hint: 'Рис'},
            {char: 'ル', reading: 'ru', hint: 'Рука'},
            {char: 'レ', reading: 're', hint: 'Река'},
            {char: 'ロ', reading: 'ro', hint: 'Рот'},
            {char: 'ワ', reading: 'wa', hint: 'Ваза'},
            {char: 'ヲ', reading: 'wo', hint: 'Вок'},
            {char: 'ン', reading: 'n', hint: 'Н (смайлик)'}
        ];

        const GRAMMAR_N5 = [
            {sentence: 'わたし ___ がくせい です', answer: 'は', options: ['は', 'が', 'を', 'に'], translation: 'Я студент'},
            {sentence: 'りんご ___ たべる', answer: 'を', options: ['を', 'は', 'に', 'で'], translation: 'Ем яблоко'},
            {sentence: 'がっこう ___ いく', answer: 'に', options: ['に', 'を', 'は', 'で'], translation: 'Иду в школу'},
            {sentence: 'ペン ___ かきます', answer: 'で', options: ['で', 'を', 'に', 'は'], translation: 'Пишу ручкой'},
            {sentence: 'ほん ___ よむ', answer: 'を', options: ['を', 'は', 'に', 'が'], translation: 'Читаю книгу'}
        ];

        // State
        let currentMode = 'alphabet';
        let currentTab = 'hiragana';
        let currentData = HIRAGANA;
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let quizItems = [];
        let swipeStartX = 0;
        let swipeCurrentX = 0;
        let isDragging = false;

        // ==================== ROUTING ====================
        function init() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode') || 'alphabet';

            document.getElementById('loading').style.display = 'none';

            switch(mode) {
                case 'swipe':
                    startSwipeMode();
                    break;
                case 'quiz':
                    startQuizMode();
                    break;
                case 'grammar':
                    startGrammarMode();
                    break;
                case 'alphabet':
                default:
                    startAlphabetMode();
                    break;
            }
        }

        // ==================== ALPHABET MODE ====================
        function startAlphabetMode() {
            currentMode = 'alphabet';
            document.getElementById('alphabetMode').classList.add('active');
            renderKanaGrid();
            setupTabs();
        }

        function setupTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentTab = tab.dataset.tab;
                    currentData = currentTab === 'hiragana' ? HIRAGANA : KATAKANA;
                    renderKanaGrid();
                });
            });
        }

        function renderKanaGrid() {
            const grid = document.getElementById('kanaGrid');
            grid.innerHTML = currentData.map((item, idx) => `
                <div class="kana-card" onclick="showKanaDetail(${idx})">
                    <div class="char">${item.char}</div>
                    <div class="reading">${item.reading}</div>
                </div>
            `).join('');
        }

        function showKanaDetail(idx) {
            const item = currentData[idx];
            document.getElementById('modalChar').textContent = item.char;
            document.getElementById('modalReading').textContent = item.reading;
            document.getElementById('modalHint').textContent = item.hint;
            document.getElementById('modal').classList.add('show');
            try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function playSound() {
            const char = document.getElementById('modalChar').textContent;
            const utterance = new SpeechSynthesisUtterance(char);
            utterance.lang = 'ja-JP';
            speechSynthesis.speak(utterance);
            try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
        }

        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // ==================== SWIPE MODE ====================
        function startSwipeMode() {
            currentMode = 'swipe';
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;

            // Mix hiragana and katakana
            const allKana = [...HIRAGANA, ...KATAKANA];
            quizItems = shuffleArray(allKana).slice(0, 10);

            document.getElementById('swipeMode').classList.add('active');
            renderSwipeCard();
            setupSwipeGestures();
        }

        function renderSwipeCard() {
            if (currentIndex >= quizItems.length) {
                showResults();
                return;
            }

            const item = quizItems[currentIndex];
            const card = document.getElementById('swipeCard');

            card.querySelector('.card-char').textContent = item.char;
            card.querySelector('.card-answer').textContent = item.reading;
            card.classList.remove('show-answer');
            card.style.transform = 'translateX(0) rotate(0deg)';
            card.style.opacity = '1';

            document.getElementById('swipeCount').textContent = `${currentIndex + 1} / ${quizItems.length}`;
            document.getElementById('swipeProgress').style.width = `${(currentIndex / quizItems.length) * 100}%`;

            // Reset indicators
            document.querySelectorAll('.indicator').forEach(ind => ind.style.opacity = '0');
        }

        function setupSwipeGestures() {
            const card = document.getElementById('swipeCard');
            const area = document.getElementById('swipeArea');

            // Show answer on tap
            card.addEventListener('click', () => {
                if (!isDragging) {
                    card.classList.toggle('show-answer');
                }
            });

            // Touch events
            card.addEventListener('touchstart', handleTouchStart, {passive: true});
            card.addEventListener('touchmove', handleTouchMove, {passive: false});
            card.addEventListener('touchend', handleTouchEnd);

            // Mouse events for desktop
            card.addEventListener('mousedown', handleMouseDown);
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }

        function handleTouchStart(e) {
            swipeStartX = e.touches[0].clientX;
            isDragging = true;
            document.getElementById('swipeCard').classList.add('dragging');
        }

        function handleTouchMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            swipeCurrentX = e.touches[0].clientX;
            updateCardPosition();
        }

        function handleTouchEnd() {
            if (!isDragging) return;
            isDragging = false;
            document.getElementById('swipeCard').classList.remove('dragging');
            handleSwipeEnd();
        }

        function handleMouseDown(e) {
            swipeStartX = e.clientX;
            isDragging = true;
            document.getElementById('swipeCard').classList.add('dragging');
        }

        function handleMouseMove(e) {
            if (!isDragging) return;
            swipeCurrentX = e.clientX;
            updateCardPosition();
        }

        function handleMouseUp() {
            if (!isDragging) return;
            isDragging = false;
            document.getElementById('swipeCard').classList.remove('dragging');
            handleSwipeEnd();
        }

        function updateCardPosition() {
            const diff = swipeCurrentX - swipeStartX;
            const card = document.getElementById('swipeCard');
            const rotation = diff * 0.1;
            card.style.transform = `translateX(${diff}px) rotate(${rotation}deg)`;

            // Show indicators
            const knowInd = document.querySelector('.indicator.know');
            const dontKnowInd = document.querySelector('.indicator.dont-know');

            if (diff > 50) {
                knowInd.style.opacity = Math.min((diff - 50) / 100, 1);
                dontKnowInd.style.opacity = '0';
            } else if (diff < -50) {
                dontKnowInd.style.opacity = Math.min((-diff - 50) / 100, 1);
                knowInd.style.opacity = '0';
            } else {
                knowInd.style.opacity = '0';
                dontKnowInd.style.opacity = '0';
            }
        }

        function handleSwipeEnd() {
            const diff = swipeCurrentX - swipeStartX;
            const card = document.getElementById('swipeCard');

            if (Math.abs(diff) > 100) {
                // Swipe completed
                const direction = diff > 0 ? 'right' : 'left';

                if (direction === 'right') {
                    correctCount++;
                    card.style.transform = 'translateX(500px) rotate(30deg)';
                } else {
                    wrongCount++;
                    card.style.transform = 'translateX(-500px) rotate(-30deg)';
                }
                card.style.opacity = '0';

                try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}

                setTimeout(() => {
                    currentIndex++;
                    renderSwipeCard();
                }, 300);
            } else {
                // Return to center
                card.style.transform = 'translateX(0) rotate(0deg)';
                document.querySelectorAll('.indicator').forEach(ind => ind.style.opacity = '0');
            }
        }

        // ==================== QUIZ MODE ====================
        function startQuizMode() {
            currentMode = 'quiz';
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;

            const allKana = [...HIRAGANA, ...KATAKANA];
            quizItems = shuffleArray(allKana).slice(0, 5);

            document.getElementById('quizMode').classList.add('active');
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            if (currentIndex >= quizItems.length) {
                showResults();
                return;
            }

            const item = quizItems[currentIndex];
            document.getElementById('quizChar').textContent = item.char;
            document.getElementById('quizCount').textContent = `${currentIndex + 1} / ${quizItems.length}`;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;

            // Generate options
            const allReadings = [...new Set([...HIRAGANA, ...KATAKANA].map(k => k.reading))];
            const wrongOptions = shuffleArray(allReadings.filter(r => r !== item.reading)).slice(0, 3);
            const options = shuffleArray([item.reading, ...wrongOptions]);

            const optionsHtml = options.map(opt => `
                <button class="quiz-option" onclick="checkAnswer('${opt}', '${item.reading}')">${opt}</button>
            `).join('');

            document.getElementById('quizOptions').innerHTML = optionsHtml;
        }

        function checkAnswer(selected, correct) {
            const buttons = document.querySelectorAll('.quiz-option');
            buttons.forEach(btn => {
                btn.classList.add('disabled');
                if (btn.textContent === correct) {
                    btn.classList.add('correct');
                } else if (btn.textContent === selected && selected !== correct) {
                    btn.classList.add('wrong');
                }
            });

            if (selected === correct) {
                correctCount++;
                try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}
            } else {
                wrongCount++;
                try { tg.HapticFeedback.notificationOccurred('error'); } catch(e) {}
            }

            setTimeout(() => {
                currentIndex++;
                renderQuizQuestion();
            }, 1000);
        }

        // ==================== GRAMMAR MODE ====================
        function startGrammarMode() {
            currentMode = 'grammar';
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;

            quizItems = shuffleArray([...GRAMMAR_N5]).slice(0, 5);

            document.getElementById('grammarMode').classList.add('active');
            renderGrammarQuestion();
        }

        function renderGrammarQuestion() {
            if (currentIndex >= quizItems.length) {
                showResults();
                return;
            }

            const item = quizItems[currentIndex];
            document.getElementById('grammarSentence').innerHTML = item.sentence.replace('___', '<span class="grammar-blank"></span>');
            document.getElementById('grammarTranslation').textContent = item.translation;
            document.getElementById('grammarCount').textContent = `${currentIndex + 1} / ${quizItems.length}`;

            const optionsHtml = item.options.map(opt => `
                <button class="grammar-option" onclick="checkGrammar('${opt}', '${item.answer}')">${opt}</button>
            `).join('');

            document.getElementById('grammarOptions').innerHTML = optionsHtml;
        }

        function checkGrammar(selected, correct) {
            const buttons = document.querySelectorAll('.grammar-option');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === correct) {
                    btn.classList.add('correct');
                } else if (btn.textContent === selected && selected !== correct) {
                    btn.classList.add('wrong');
                }
            });

            // Fill in the blank
            document.querySelector('.grammar-blank').textContent = correct;

            if (selected === correct) {
                correctCount++;
                try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}
            } else {
                wrongCount++;
                try { tg.HapticFeedback.notificationOccurred('error'); } catch(e) {}
            }

            setTimeout(() => {
                currentIndex++;
                renderGrammarQuestion();
            }, 1200);
        }

        // ==================== RESULTS ====================
        function showResults() {
            // Hide all modes
            document.querySelectorAll('.alphabet-container, .swipe-container, .quiz-container, .grammar-container')
                .forEach(el => el.classList.remove('active'));

            document.getElementById('resultsMode').classList.add('active');

            const total = quizItems.length;
            const score = correctCount;
            const percent = Math.round((score / total) * 100);

            let icon, title, subtitle;

            if (percent === 100) {
                icon = '🏆';
                title = 'Идеально!';
                subtitle = 'Ты настоящий мастер!';
            } else if (percent >= 80) {
                icon = '🎉';
                title = 'Отлично!';
                subtitle = 'Так держать!';
            } else if (percent >= 60) {
                icon = '👍';
                title = 'Хорошо!';
                subtitle = 'Есть куда расти!';
            } else {
                icon = '💪';
                title = 'Попробуй ещё!';
                subtitle = 'Практика — путь к успеху!';
            }

            document.getElementById('resultsIcon').textContent = icon;
            document.getElementById('resultsTitle').textContent = title;
            document.getElementById('resultsScore').textContent = `${score} / ${total}`;
            document.getElementById('resultsSubtitle').textContent = subtitle;

            try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}
        }

        function sendResults() {
            const prefix = currentMode === 'grammar' ? 'grammar_result_' : 
                          currentMode === 'swipe' ? 'swipe_result_' : 'quiz_result_';
            tg.sendData(prefix + correctCount);
        }

        // ==================== HELPERS ====================
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Start app
        init();
    </script>
</body>
</html>
