<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeleLingo Web</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box; overflow: hidden;
        }

        /* Общие стили */
        .header { width: 100%; text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: bold; color: #94a3b8; }
        .hidden { display: none !important; }

        /* =========================================
           РЕЖИМ 1: СВАЙПЫ (TINDER)
           ========================================= */
        #swipe-mode { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .card-stack { position: relative; width: 300px; height: 400px; margin-top: 20px; perspective: 1000px; }
        
        .swipe-card {
            position: absolute; width: 100%; height: 100%;
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform-style: preserve-3d; transition: transform 0.3s ease;
            cursor: grab; user-select: none;
        }
        
        /* Лицевая и обратная сторона карточки */
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; padding: 20px; box-sizing: border-box;
        }
        .card-front { background: white; color: #0f172a; }
        .card-back { background: #4f46e5; color: white; transform: rotateY(180deg); }

        .card-symbol { font-size: 80px; font-weight: bold; margin: 0; }
        .card-reading { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
        .card-hint { font-size: 18px; color: #cbd5e1; text-align: center; }
        .tap-hint { position: absolute; bottom: 20px; font-size: 14px; color: #94a3b8; }

        .swipe-actions { display: flex; justify-content: space-between; width: 300px; margin-top: 40px; }
        .btn-swipe { 
            width: 70px; height: 70px; border-radius: 50%; border: none; 
            font-size: 30px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; transition: 0.2s;
        }
        .btn-swipe.left { background: #ef4444; color: white; }
        .btn-swipe.right { background: #10b981; color: white; }
        .btn-swipe:active { transform: scale(0.9); }

        /* =========================================
           РЕЖИМ 2: МАГНИТНАЯ ГРАММАТИКА
           ========================================= */
        #grammar-mode { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .grammar-sentence {
            background: white; color: #0f172a; width: 100%; max-width: 350px;
            border-radius: 20px; padding: 40px 20px; margin-top: 30px;
            font-size: 28px; font-weight: bold; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            line-height: 1.5;
        }
        .drop-zone {
            display: inline-block; min-width: 50px; height: 40px;
            border-bottom: 4px dashed #94a3b8; color: #4f46e5; vertical-align: bottom;
            margin: 0 10px; transition: 0.3s;
        }
        .drop-zone.filled { border-bottom: 4px solid #10b981; color: #10b981; }
        .drop-zone.error { border-bottom: 4px solid #ef4444; color: #ef4444; animation: shake 0.4s; }

        .particles-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 50px; width: 100%; max-width: 350px;}
        .particle-btn {
            background: #f1f5f9; border: 2px solid #e2e8f0; color: #334155;
            font-size: 24px; font-weight: bold; width: 70px; height: 70px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
        }
        .particle-btn:active { transform: scale(0.9); background: #e2e8f0; }

        /* Экраны финала */
        #result-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        .claim-btn { background: #8b5cf6; color: white; font-size: 20px; font-weight: bold; border: none; padding: 15px 40px; border-radius: 15px; width: 100%; max-width: 300px; margin-top: 30px;}

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

    <div class="header" id="header-title">Загрузка...</div>

    <!-- РЕЖИМ СВАЙПОВ -->
    <div id="swipe-mode" class="hidden">
        <div class="card-stack" id="card-stack"></div>
        <div class="swipe-actions">
            <button class="btn-swipe left" onclick="swipeCard('left')">❌</button>
            <button class="btn-swipe right" onclick="swipeCard('right')">✅</button>
        </div>
    </div>

    <!-- РЕЖИМ ГРАММАТИКИ -->
    <div id="grammar-mode" class="hidden">
        <div class="grammar-sentence" id="grammar-sentence">
            <!-- Сюда JS вставит фразу -->
        </div>
        <div class="particles-grid" id="particles-grid">
            <!-- Сюда JS вставит кнопки-частицы -->
        </div>
    </div>

    <!-- ФИНАЛ -->
    <div id="result-screen" class="hidden">
        <div style="font-size: 80px;">🎉</div>
        <h2 style="margin:10px 0;">Урок завершен!</h2>
        <p style="color:#cbd5e1;" id="result-desc">Вы отлично справились</p>
        <button class="claim-btn" onclick="claimReward()">Забрать награду</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let appData = { mode: "swipe", items: [] };
        let currentIndex = 0;
        let score = 0;

        // Инициализация
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawData = urlParams.get('data');
            const mode = urlParams.get('mode') || 'swipe';
            
            if (rawData) {
                try {
                    appData.items = JSON.parse(decodeURIComponent(escape(atob(rawData))));
                    appData.mode = mode;
                } catch(e) { alert("Ошибка данных"); }
            } else {
                // Тестовые данные, если открыть напрямую
                if (mode === 'grammar') {
                    appData.mode = 'grammar';
                    appData.items = [{q: "わたし ___ がくせい", c: "は", a: ["を","は","に","で"]}];
                } else {
                    appData.mode = 'swipe';
                    appData.items = [{q: "水", r: "mizu", t: "Вода"}, {q: "火", r: "hi", t: "Огонь"}];
                }
            }

            if (appData.mode === 'swipe') initSwipeMode();
            else initGrammarMode();
        };

        /* =========================================
           ЛОГИКА СВАЙПОВ (TINDER)
           ========================================= */
        let activeCard = null;

        function initSwipeMode() {
            document.getElementById('swipe-mode').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Свайп: Вправо-Помню, Влево-Забыл";
            renderCards();
        }

        function renderCards() {
            const stack = document.getElementById('card-stack');
            stack.innerHTML = "";
            
            // Рисуем карточки в обратном порядке, чтобы первая была сверху
            for (let i = appData.items.length - 1; i >= currentIndex; i--) {
                const item = appData.items[i];
                const card = document.createElement('div');
                card.className = 'swipe-card';
                card.style.zIndex = appData.items.length - i;
                
                // Физика только для верхней карточки
                if (i === currentIndex) {
                    activeCard = card;
                    setupCardPhysics(card);
                } else {
                    // Остальные чуть меньше и ниже для эффекта стопки
                    card.style.transform = `scale(${1 - (i-currentIndex)*0.05}) translateY(${(i-currentIndex)*10}px)`;
                }

                card.innerHTML = `
                    <div class="card-front" onclick="flipCard(this.parentElement)">
                        <h1 class="card-symbol">${item.q}</h1>
                        <div class="tap-hint">Нажми, чтобы перевернуть</div>
                    </div>
                    <div class="card-back" onclick="flipCard(this.parentElement)">
                        <div class="card-reading">${item.r}</div>
                        <div class="card-hint">${item.t}</div>
                    </div>
                `;
                stack.appendChild(card);
            }
        }

        function flipCard(card) {
            const currentRotation = card.style.transform;
            if (currentRotation.includes('rotateY(180deg)')) {
                card.style.transform = 'rotateY(0deg)';
            } else {
                card.style.transform = 'rotateY(180deg)';
                try { tg.HapticFeedback.impactOccurred("light"); } catch(e){}
            }
        }

        function setupCardPhysics(card) {
            let startX = 0, currentX = 0;
            let isDragging = false;

            const onStart = (e) => {
                isDragging = true;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                card.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!isDragging) return;
                currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].pageX) - startX;
                const rotate = currentX * 0.1;
                // Не сбрасываем flip, если он есть
                const isFlipped = card.style.transform.includes('rotateY');
                card.style.transform = `translate(${currentX}px, ${Math.abs(currentX)*0.1}px) rotate(${rotate}deg) ${isFlipped ? 'rotateY(180deg)' : ''}`;
            };

            const onEnd = () => {
                isDragging = false;
                card.style.transition = 'transform 0.3s ease';
                if (currentX > 100) swipeCard('right');
                else if (currentX < -100) swipeCard('left');
                else {
                    // Возврат в центр
                    const isFlipped = card.style.transform.includes('rotateY');
                    card.style.transform = `translate(0px, 0px) rotate(0deg) ${isFlipped ? 'rotateY(180deg)' : ''}`;
                }
            };

            card.addEventListener('mousedown', onStart);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            
            card.addEventListener('touchstart', onStart, {passive: true});
            document.addEventListener('touchmove', onMove, {passive: true});
            document.addEventListener('touchend', onEnd);
        }

        function swipeCard(direction) {
            if (!activeCard) return;
            const flyX = direction === 'right' ? window.innerWidth : -window.innerWidth;
            activeCard.style.transition = 'transform 0.4s ease-out';
            activeCard.style.transform = `translate(${flyX}px, 100px) rotate(${direction==='right'?30:-30}deg)`;
            
            if (direction === 'right') {
                score++;
                try { tg.HapticFeedback.notificationOccurred("success"); } catch(e){}
            } else {
                try { tg.HapticFeedback.notificationOccurred("error"); } catch(e){}
            }

            activeCard = null;
            setTimeout(() => {
                currentIndex++;
                if (currentIndex >= appData.items.length) showResults();
                else renderCards();
            }, 300);
        }

        /* =========================================
           РЕЖИМ 2: МАГНИТНАЯ ГРАММАТИКА
           ========================================= */
        function initGrammarMode() {
            document.getElementById('grammar-mode').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Вставь пропущенное слово";
            renderGrammar();
        }

        function renderGrammar() {
            if (currentIndex >= appData.items.length) { showResults(); return; }
            
            const item = appData.items[currentIndex];
            const sentenceBox = document.getElementById('grammar-sentence');
            // Рисуем лунку
            sentenceBox.innerHTML = item.q.replace("___", `<span class="drop-zone" id="grammar-zone"></span>`);
            
            const grid = document.getElementById('particles-grid');
            grid.innerHTML = "";
            
            item.a.forEach(particle => {
                const btn = document.createElement('div');
                btn.className = 'particle-btn';
                btn.innerText = particle;
                btn.onclick = () => insertParticle(particle, item.c);
                grid.appendChild(btn);
            });
        }

        function insertParticle(selected, correct) {
            const zone = document.getElementById('grammar-zone');
            zone.innerText = selected;
            
            if (selected === correct) {
                zone.className = "drop-zone filled";
                score++;
                try { tg.HapticFeedback.notificationOccurred("success"); } catch(e){}
                setTimeout(() => { currentIndex++; renderGrammar(); }, 1000);
            } else {
                zone.className = "drop-zone error";
                try { tg.HapticFeedback.notificationOccurred("error"); } catch(e){}
                setTimeout(() => { zone.innerText = ""; zone.className = "drop-zone"; }, 600);
            }
        }

        /* =========================================
           ФИНАЛ
           ========================================= */
        function showResults() {
            document.getElementById('swipe-mode').classList.add('hidden');
            document.getElementById('grammar-mode').classList.add('hidden');
            document.getElementById('header-title').classList.add('hidden');
            
            const resultScreen = document.getElementById('result-screen');
            resultScreen.classList.remove('hidden');
            document.getElementById('result-desc').innerText = `Счет: ${score} из ${appData.items.length}`;
        }

        function claimReward() {
            tg.sendData(`${appData.mode}_result_${score}`);
        }
    </script>
</body>
</html>
