<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YomuBot - Японский язык</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="data.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ... (весь CSS без изменений, как в исходном файле) ... */
    </style>
</head>
<body>
    <!-- ... (весь HTML без изменений, как в исходном файле) ... -->

    <script>
        // ==================== TELEGRAM ====================
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ==================== STATE ====================
        let user = {
            name: 'Пользователь',
            xp: 0,
            streak: 0,
            cardsLearned: 0,
            achievements: [],
            settings: { sound: true, vibration: true },
            lastDaily: null
        };

        let currentScreen = 'home';
        let alphabetTab = 'hiragana';
        let alphabetView = 'grid';
        let modalData = null;

        let quiz = {
            items: [],
            index: 0,
            correct: 0,
            wrong: 0,
            type: 'mixed'
        };

        let swipe = {
            items: [],
            index: 0,
            correct: 0,
            wrong: 0
        };

        // ==================== ДАННЫЕ ====================
        const ACHIEVEMENTS = [
            {id: 'first', name: 'Первый шаг', icon: '👶', check: u => u.cardsLearned >= 1},
            {id: 'streak3', name: 'Огонёк', icon: '🔥', check: u => u.streak >= 3},
            {id: 'streak7', name: 'Пламя', icon: '🔥', check: u => u.streak >= 7},
            {id: 'cards50', name: 'Полиглот', icon: '📚', check: u => u.cardsLearned >= 50},
            {id: 'cards100', name: 'Мастер', icon: '🎓', check: u => u.cardsLearned >= 100},
            {id: 'xp1000', name: 'Тысячник', icon: '⭐', check: u => u.xp >= 1000},
            {id: 'xp5000', name: 'Звезда', icon: '🌟', check: u => u.xp >= 5000},
            {id: 'perfect', name: 'Идеально', icon: '💯', check: u => u.perfectTests >= 1}
        ];

        const DAILY_QUESTS = [
            {id: 'cards10', name: 'Изучить 10 карточек', target: 10, xp: 30, icon: '📚'},
            {id: 'test', name: 'Пройти тест', target: 1, xp: 20, icon: '✅'},
            {id: 'login', name: 'Зайти в приложение', target: 1, xp: 10, icon: '👋'}
        ];

        const WHEEL_PRIZES = [
            {value: 10, color: '#e74c3c'},
            {value: 25, color: '#9b59b6'},
            {value: 50, color: '#3498db'},
            {value: 100, color: '#2ecc71'},
            {value: 15, color: '#e67e22'},
            {value: 75, color: '#1abc9c'},
            {value: 30, color: '#f39c12'},
            {value: 150, color: '#e91e63'}
        ];

        // ==================== НОВАЯ ФУНКЦИЯ ОТПРАВКИ ====================
        function sendResult(type, score) {
            const data = {
                type: type,
                score: score,
                initData: tg.initData  // передаём строку initData
            };
            tg.sendData(JSON.stringify(data));
        }

        // ==================== INIT ====================
        function init() {
            // Load user from Telegram
            if (tg.initDataUnsafe?.user) {
                user.name = tg.initDataUnsafe.user.first_name || 'Пользователь';
            }

            // Load from localStorage
            const saved = localStorage.getItem('yomubot_user');
            if (saved) {
                const data = JSON.parse(saved);
                user = {...user, ...data};
            }

            // Update daily quest
            const today = new Date().toDateString();
            if (!user.questsDate || user.questsDate !== today) {
                user.questsDate = today;
                user.quests = {};
            }
            
            // Mark login quest
            if (!user.quests) user.quests = {};
            user.quests.login = 1;
            saveUser();

            // Hide loading
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
                updateUI();
                createWheel();
            }, 800);
        }

        // ==================== NAVIGATION ====================
        function goTo(screen, param = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navBtn = document.querySelector(`.nav-item[onclick="goTo('${screen}')"]`);
            if (navBtn) navBtn.classList.add('active');
            document.getElementById(screen + 'Screen').classList.add('active');
            currentScreen = screen;
            if (screen === 'alphabet') renderAlphabet();
            if (screen === 'study') renderStudy(param);
            if (screen === 'profile') renderProfile();
            haptic('light');
        }

        // ==================== UI UPDATE ====================
        function updateUI() {
            const rank = getRank(user.xp);
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userXp').textContent = user.xp;
            document.getElementById('userStreak').textContent = user.streak;
            document.getElementById('userCards').textContent = user.cardsLearned;
            document.getElementById('userBadge').textContent = rank.badge;
            document.getElementById('userRankName').textContent = rank.name;
            renderQuests();
        }

        function getRank(xp) {
            let rank = RANKS[0];
            for (const r of RANKS) {
                if (xp >= r.min) rank = r;
            }
            return rank;
        }

        function renderQuests() {
            const container = document.getElementById('questsList');
            const quests = user.quests || {};
            container.innerHTML = DAILY_QUESTS.map(q => {
                const progress = quests[q.id] || 0;
                const done = progress >= q.target;
                const pct = Math.min(progress / q.target * 100, 100);
                return `
                    <div class="quest-item ${done ? 'done' : ''}">
                        <div class="quest-icon">${q.icon}</div>
                        <div class="quest-info">
                            <div class="quest-title">${q.name}</div>
                            <div class="quest-bar">
                                <div class="quest-bar-fill" style="width:${pct}%"></div>
                            </div>
                        </div>
                        <div class="quest-reward">${done ? '✓' : '+' + q.xp}</div>
                    </div>
                `;
            }).join('');
        }

        // ==================== ALPHABET ====================
        function setAlphabetTab(tab) {
            alphabetTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="setAlphabetTab('${tab}')"]`).classList.add('active');
            renderAlphabet();
        }

        function setAlphabetView(view) {
            alphabetView = view;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.view-btn[onclick="setAlphabetView('${view}')"]`).classList.add('active');
            renderAlphabet();
        }

        function renderAlphabet() {
            const rows = alphabetTab === 'hiragana' ? HIRAGANA_ROWS : KATAKANA_ROWS;
            const allChars = rows.flatMap(r => r.chars);
            if (alphabetView === 'grid') {
                document.getElementById('alphabetGrid').classList.remove('hidden');
                document.getElementById('alphabetRows').classList.add('hidden');
                document.getElementById('alphabetGrid').innerHTML = allChars.map((c, i) => `
                    <div class="kana-cell" onclick="openKanaModal(${i})">
                        <div class="char japanese">${c.char}</div>
                        <div class="reading">${c.reading}</div>
                    </div>
                `).join('');
            } else {
                document.getElementById('alphabetGrid').classList.add('hidden');
                document.getElementById('alphabetRows').classList.remove('hidden');
                document.getElementById('alphabetRows').innerHTML = rows.map((row, ri) => `
                    <div class="kana-row">
                        <div class="row-header">
                            <span class="row-title">${row.name}</span>
                            <button class="row-test-btn" onclick="startRowQuiz(${ri})">📝 Тест</button>
                        </div>
                        <div class="row-cards">
                            ${row.chars.map((c, ci) => `
                                <div class="row-card" onclick="openKanaModalFromRow(${ri}, ${ci})">
                                    <div class="char japanese">${c.char}</div>
                                    <div class="reading">${c.reading}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }
        }

        function openKanaModal(index) {
            const rows = alphabetTab === 'hiragana' ? HIRAGANA_ROWS : KATAKANA_ROWS;
            const allChars = rows.flatMap(r => r.chars);
            openModal(allChars[index]);
        }

        function openKanaModalFromRow(rowIndex, charIndex) {
            const rows = alphabetTab === 'hiragana' ? HIRAGANA_ROWS : KATAKANA_ROWS;
            openModal(rows[rowIndex].chars[charIndex]);
        }

        // ==================== STUDY ====================
        function renderStudy(category = null) {
            const categories = [
                {id: 'kanji_n5', name: 'Кандзи N5', icon: '🈁', desc: '103 базовых иероглифа', data: KANJI_N5},
                {id: 'kanji_n4', name: 'Кандзи N4', icon: '🈁', desc: '181 иероглиф', data: KANJI_N4},
                {id: 'kanji_n3', name: 'Кандзи N3', icon: '🈁', desc: '370 иероглифов', data: KANJI_N3},
                {id: 'words_n5', name: 'Слова N5', icon: '📝', desc: 'Базовая лексика', data: WORDS_N5}
            ];
            const container = document.getElementById('studyContent');
            container.innerHTML = categories.map(cat => {
                const progress = Math.floor(Math.random() * 60); // TODO: real progress
                return `
                    <div class="category-card" onclick="openCategory('${cat.id}')">
                        <div class="category-icon">${cat.icon}</div>
                        <div class="category-info">
                            <div class="category-title">${cat.name}</div>
                            <div class="category-desc">${cat.desc}</div>
                            <div class="category-bar">
                                <div class="category-bar-fill" style="width:${progress}%"></div>
                            </div>
                        </div>
                        <div class="category-arrow">›</div>
                    </div>
                `;
            }).join('');
        }

        function openCategory(id) {
            let data = [];
            if (id === 'kanji_n5') { data = KANJI_N5; }
            else if (id === 'kanji_n4') { data = KANJI_N4; }
            else if (id === 'kanji_n3') { data = KANJI_N3; }
            else if (id === 'words_n5') { data = WORDS_N5; }
            if (data.length === 0) return;
            openModal(data[0], 'kanji');
        }

        // ==================== MODAL ====================
        function openModal(item, type = 'kana') {
            modalData = item;
            document.getElementById('modalChar').textContent = item.char || item.word || '';
            document.getElementById('modalReading').textContent = item.reading || '';
            document.getElementById('modalMeaning').textContent = item.meaning || '';
            document.getElementById('modalMeaning').style.display = item.meaning ? 'block' : 'none';
            document.getElementById('modalHint').textContent = item.hint || '';
            document.getElementById('modalGif').classList.remove('show');
            document.getElementById('modal').classList.add('show');
            haptic('light');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            modalData = null;
        }

        function playSound() {
            if (!modalData) return;
            const text = modalData.char || modalData.word;
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ja-JP';
                u.rate = 0.7;
                speechSynthesis.speak(u);
            }
            haptic('medium');
        }

        function showGif() {
            if (!modalData) return;
            const char = modalData.char || modalData.word;
            const container = document.getElementById('modalGif');
            container.innerHTML = '<span style="color:#999">Загрузка...</span>';
            container.classList.add('show');
            const hex = char.charCodeAt(0).toString(16).padStart(5, '0');
            const urls = [
                `https://raw.githubusercontent.com/mistval/kanji_images/master/gifs/${hex}.gif`,
                `https://raw.githubusercontent.com/yagays/kanjivg-gif/master/gifs/${hex}.gif`
            ];
            let loaded = false;
            function tryLoad(i) {
                if (i >= urls.length || loaded) {
                    if (!loaded) container.innerHTML = '<span style="color:#f87171">Недоступно</span>';
                    return;
                }
                const img = new Image();
                img.onload = () => {
                    if (!loaded) {
                        loaded = true;
                        container.innerHTML = `<img src="${urls[i]}" style="max-width:140px;border-radius:10px">`;
                    }
                };
                img.onerror = () => tryLoad(i + 1);
                img.src = urls[i];
            }
            tryLoad(0);
            haptic('light');
        }

        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });

        // ==================== QUIZ ====================
        function startQuiz(type) {
            const allKana = [...HIRAGANA_ROWS, ...KATAKANA_ROWS].flatMap(r => r.chars);
            const count = type === 'full' ? 15 : 5;
            quiz = {
                items: shuffle(allKana).slice(0, count),
                index: 0,
                correct: 0,
                wrong: 0,
                type: type
            };
            document.getElementById('quizTitle').textContent = '🎯 Тест';
            showQuizScreen();
            renderQuizQuestion();
        }

        function startAlphabetQuiz(count) {
            const rows = alphabetTab === 'hiragana' ? HIRAGANA_ROWS : KATAKANA_ROWS;
            const allChars = rows.flatMap(r => r.chars);
            quiz = {
                items: shuffle(allChars).slice(0, count),
                index: 0,
                correct: 0,
                wrong: 0,
                type: 'alphabet'
            };
            const name = alphabetTab === 'hiragana' ? 'Хирагана' : 'Катакана';
            document.getElementById('quizTitle').textContent = `🎯 ${name}`;
            showQuizScreen();
            renderQuizQuestion();
        }

        function startRowQuiz(rowIndex) {
            const rows = alphabetTab === 'hiragana' ? HIRAGANA_ROWS : KATAKANA_ROWS;
            const row = rows[rowIndex];
            quiz = {
                items: shuffle([...row.chars]),
                index: 0,
                correct: 0,
                wrong: 0,
                type: 'row'
            };
            document.getElementById('quizTitle').textContent = `🎯 ${row.name}`;
            showQuizScreen();
            renderQuizQuestion();
        }

        function showQuizScreen() {
            document.getElementById('quizScreen').classList.add('show');
            document.getElementById('bottomNav').classList.add('hidden');
        }

        function hideQuizScreen() {
            document.getElementById('quizScreen').classList.remove('show');
            document.getElementById('resultsScreen').classList.remove('show');
            document.getElementById('bottomNav').classList.remove('hidden');
        }

        function renderQuizQuestion() {
            if (quiz.index >= quiz.items.length) {
                showResults();
                return;
            }
            const item = quiz.items[quiz.index];
            document.getElementById('quizChar').textContent = item.char;
            document.getElementById('quizCorrect').textContent = quiz.correct;
            document.getElementById('quizWrong').textContent = quiz.wrong;
            const allReadings = [...new Set(
                [...HIRAGANA_ROWS, ...KATAKANA_ROWS].flatMap(r => r.chars.map(c => c.reading))
            )];
            const wrong = shuffle(allReadings.filter(r => r !== item.reading)).slice(0, 3);
            const options = shuffle([item.reading, ...wrong]);
            document.getElementById('quizOptions').innerHTML = options.map(opt => `
                <button class="quiz-option" onclick="checkQuizAnswer('${opt}', '${item.reading}')">${opt}</button>
            `).join('');
        }

        function checkQuizAnswer(selected, correct) {
            document.querySelectorAll('.quiz-option').forEach(btn => {
                btn.classList.add('disabled');
                if (btn.textContent === correct) btn.classList.add('correct');
                else if (btn.textContent === selected) btn.classList.add('wrong');
            });
            if (selected === correct) {
                quiz.correct++;
                haptic('success');
            } else {
                quiz.wrong++;
                haptic('error');
            }
            setTimeout(() => {
                quiz.index++;
                renderQuizQuestion();
            }, 700);
        }

        function showResults() {
            document.getElementById('quizScreen').classList.remove('show');
            document.getElementById('resultsScreen').classList.add('show');
            const total = quiz.items.length;
            const score = quiz.correct;
            const pct = Math.round(score / total * 100);
            const xp = score * 10;
            let icon, title, subtitle;
            if (pct === 100) { icon = '🏆'; title = 'Идеально!'; subtitle = 'Ты мастер!'; user.perfectTests = (user.perfectTests || 0) + 1; }
            else if (pct >= 80) { icon = '🎉'; title = 'Отлично!'; subtitle = 'Так держать!'; }
            else if (pct >= 60) { icon = '👍'; title = 'Хорошо!'; subtitle = 'Есть куда расти!'; }
            else { icon = '💪'; title = 'Попробуй ещё!'; subtitle = 'Практика — ключ!'; }
            document.getElementById('resultsIcon').textContent = icon;
            document.getElementById('resultsTitle').textContent = title;
            document.getElementById('resultsScore').textContent = `${score} / ${total}`;
            document.getElementById('resultsXp').textContent = xp > 0 ? `+${xp} XP` : '';
            document.getElementById('resultsSubtitle').textContent = subtitle;
            if (xp > 0) {
                user.xp += xp;
                user.cardsLearned += score;
                user.quests = user.quests || {};
                user.quests.cards10 = (user.quests.cards10 || 0) + score;
                user.quests.test = 1;
                saveUser();
                updateUI();
            }
            haptic('success');
        }

        // ==================== ИЗМЕНЁННАЯ ФУНКЦИЯ finishQuiz ====================
        function finishQuiz() {
            // Отправляем результат в бот
            sendResult('quiz_result', quiz.correct);
            setTimeout(() => {
                hideQuizScreen();
                goTo('home');
            }, 100);
        }

        function retryQuiz() {
            hideQuizScreen();
            if (quiz.type === 'alphabet' || quiz.type === 'row') {
                goTo('alphabet');
            } else {
                startQuiz(quiz.type);
            }
        }

        // ==================== SWIPE ====================
        function startSwipe() {
            const allKana = [...HIRAGANA_ROWS, ...KATAKANA_ROWS].flatMap(r => r.chars);
            swipe = {
                items: shuffle(allKana).slice(0, 10),
                index: 0,
                correct: 0,
                wrong: 0
            };
            document.getElementById('swipeScreen').classList.add('show');
            document.getElementById('bottomNav').classList.add('hidden');
            renderSwipeCard();
        }

        function renderSwipeCard() {
            if (swipe.index >= swipe.items.length) {
                showSwipeResults();
                return;
            }
            const item = swipe.items[swipe.index];
            const card = document.getElementById('swipeCard');
            document.getElementById('swipeChar').textContent = item.char;
            document.getElementById('swipeAnswer').textContent = item.reading;
            document.getElementById('swipeHint').style.display = 'block';
            document.getElementById('swipeAnswer').style.opacity = '0';
            card.classList.remove('revealed');
            card.style.transform = '';
            card.style.opacity = '1';
            document.getElementById('swipeCount').textContent = `${swipe.index + 1} / ${swipe.items.length}`;
            document.getElementById('swipeProgress').style.width = `${swipe.index / swipe.items.length * 100}%`;
            document.querySelectorAll('.indicator').forEach(i => i.style.opacity = '0');
        }

        function swipeReveal() {
            const card = document.getElementById('swipeCard');
            card.classList.add('revealed');
            document.getElementById('swipeAnswer').style.opacity = '1';
            document.getElementById('swipeHint').style.display = 'none';
            haptic('light');
        }

        function swipeYes() {
            const card = document.getElementById('swipeCard');
            document.querySelector('.indicator.know').style.opacity = '1';
            card.style.transform = 'translateX(300px) rotate(15deg)';
            card.style.opacity = '0';
            swipe.correct++;
            haptic('medium');
            setTimeout(() => {
                swipe.index++;
                renderSwipeCard();
            }, 250);
        }

        function swipeNo() {
            const card = document.getElementById('swipeCard');
            document.querySelector('.indicator.learn').style.opacity = '1';
            card.style.transform = 'translateX(-300px) rotate(-15deg)';
            card.style.opacity = '0';
            swipe.wrong++;
            haptic('medium');
            setTimeout(() => {
                swipe.index++;
                renderSwipeCard();
            }, 250);
        }

        // ==================== ИЗМЕНЁННАЯ ФУНКЦИЯ showSwipeResults ====================
        function showSwipeResults() {
            document.getElementById('swipeScreen').classList.remove('show');
            const xp = swipe.correct * 10;
            quiz.correct = swipe.correct;
            quiz.items = swipe.items;
            quiz.type = 'swipe';
            if (xp > 0) {
                user.xp += xp;
                user.cardsLearned += swipe.correct;
                user.quests = user.quests || {};
                user.quests.cards10 = (user.quests.cards10 || 0) + swipe.correct;
                saveUser();
                updateUI();
            }
            document.getElementById('resultsScreen').classList.add('show');
            document.getElementById('resultsIcon').textContent = swipe.correct === swipe.items.length ? '🏆' : '👍';
            document.getElementById('resultsTitle').textContent = 'Карточки пройдены!';
            document.getElementById('resultsScore').textContent = `${swipe.correct} / ${swipe.items.length}`;
            document.getElementById('resultsXp').textContent = xp > 0 ? `+${xp} XP` : '';
            document.getElementById('resultsSubtitle').textContent = `Знал: ${swipe.correct}, Учить: ${swipe.wrong}`;
            haptic('success');
            // Отправляем результат
            sendResult('swipe_result', swipe.correct);
        }

        // ==================== WHEEL ====================
        function createWheel() {
            const svg = document.getElementById('wheel');
            const total = WHEEL_PRIZES.length;
            const angle = 360 / total;
            let html = '';
            WHEEL_PRIZES.forEach((prize, i) => {
                const startAngle = i * angle - 90;
                const endAngle = startAngle + angle;
                const startRad = startAngle * Math.PI / 180;
                const endRad = endAngle * Math.PI / 180;
                const x1 = 50 + 50 * Math.cos(startRad);
                const y1 = 50 + 50 * Math.sin(startRad);
                const x2 = 50 + 50 * Math.cos(endRad);
                const y2 = 50 + 50 * Math.sin(endRad);
                html += `<path d="M 50 50 L ${x1} ${y1} A 50 50 0 0 1 ${x2} ${y2} Z" fill="${prize.color}"/>`;
                const textAngle = startAngle + angle / 2;
                const textRad = textAngle * Math.PI / 180;
                const tx = 50 + 32 * Math.cos(textRad);
                const ty = 50 + 32 * Math.sin(textRad);
                html += `<text x="${tx}" y="${ty}" fill="white" font-size="7" font-weight="bold" 
                         text-anchor="middle" dominant-baseline="middle" 
                         transform="rotate(${textAngle + 90}, ${tx}, ${ty})">${prize.value}</text>`;
            });
            svg.innerHTML = html;
        }

        function openWheel() {
            document.getElementById('wheelScreen').classList.add('show');
            document.getElementById('bottomNav').classList.add('hidden');
            document.getElementById('wheelResult').classList.remove('show');
            const today = new Date().toDateString();
            if (user.lastDaily === today) {
                document.getElementById('wheelSpinBtn').disabled = true;
                document.getElementById('wheelSpinBtn').textContent = 'Завтра!';
            } else {
                document.getElementById('wheelSpinBtn').disabled = false;
                document.getElementById('wheelSpinBtn').textContent = '🎲 КРУТИТЬ!';
            }
        }

        function closeWheel() {
            document.getElementById('wheelScreen').classList.remove('show');
            document.getElementById('bottomNav').classList.remove('hidden');
        }

        let wheelRotation = 0;

        // ==================== ИЗМЕНЁННАЯ ФУНКЦИЯ spinWheel ====================
        function spinWheel() {
            const today = new Date().toDateString();
            if (user.lastDaily === today) return;
            const btn = document.getElementById('wheelSpinBtn');
            btn.disabled = true;
            btn.textContent = '🎰 Крутится...';
            const prizeIndex = Math.floor(Math.random() * WHEEL_PRIZES.length);
            const prize = WHEEL_PRIZES[prizeIndex];
            const segmentAngle = 360 / WHEEL_PRIZES.length;
            const targetAngle = 360 - (prizeIndex * segmentAngle + segmentAngle / 2);
            const spins = 5 + Math.random() * 3;
            wheelRotation += spins * 360 + targetAngle - (wheelRotation % 360);
            document.getElementById('wheel').style.transform = `rotate(${wheelRotation}deg)`;
            haptic('medium');
            setTimeout(() => {
                user.xp += prize.value;
                user.lastDaily = today;
                saveUser();
                updateUI();
                document.getElementById('wheelResultXp').textContent = `+${prize.value} XP`;
                document.getElementById('wheelResult').classList.add('show');
                btn.textContent = '✅ Готово!';
                haptic('success');
                // Отправляем результат
                sendResult('wheel_reward', prize.value);
            }, 4500);
        }

        // ==================== PROFILE ====================
        function renderProfile() {
            const rank = getRank(user.xp);
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileXp').textContent = user.xp;
            document.getElementById('profileStreak').textContent = user.streak;
            document.getElementById('profileCards').textContent = user.cardsLearned;
            document.getElementById('profileBadge').textContent = rank.badge;
            document.getElementById('profileRankName').textContent = rank.name;
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = ACHIEVEMENTS.map(a => {
                const unlocked = a.check(user);
                return `
                    <div class="achievement ${unlocked ? '' : 'locked'}">
                        <div class="achievement-icon">${a.icon}</div>
                        <div class="achievement-name">${a.name}</div>
                    </div>
                `;
            }).join('');
        }

        // ==================== SETTINGS ====================
        function toggleSetting(key) {
            user.settings[key] = !user.settings[key];
            document.getElementById(key + 'Toggle').classList.toggle('active', user.settings[key]);
            saveUser();
            haptic('light');
        }

        function exportData() {
            const data = JSON.stringify(user, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'yomubot_progress.json';
            a.click();
        }

        function showAbout() {
            alert('YomuBot v2.0\n\nПриложение для изучения японского языка.\n\n🎌 Сделано с любовью!');
        }

        // ==================== HELPERS ====================
        function saveUser() {
            localStorage.setItem('yomubot_user', JSON.stringify(user));
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function haptic(type) {
            if (!user.settings.vibration) return;
            try {
                if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
                else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
                else if (type === 'medium') tg.HapticFeedback.impactOccurred('medium');
                else tg.HapticFeedback.impactOccurred('light');
            } catch(e) {}
        }

        // ==================== START ====================
        init();
    </script>
</body>
</html>
