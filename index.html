<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeleLingo Web</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box; overflow: hidden;
        }

        .header { width: 100%; text-align: center; margin-bottom: 20px; font-size: 20px; font-weight: bold; color: #94a3b8; }
        .hidden { display: none !important; }

        /* =========================================
           РЕЖИМ 1: СВАЙПЫ (TINDER)
           ========================================= */
        #swipe-mode { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }
        .card-stack { position: relative; width: 300px; height: 400px; margin-top: 20px; perspective: 1000px; }
        
        .swipe-card {
            position: absolute; width: 100%; height: 100%;
            background: white; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform-style: preserve-3d; transition: transform 0.3s ease;
            cursor: grab; user-select: none;
        }
        
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 20px; padding: 20px; box-sizing: border-box;
        }
        .card-front { background: white; color: #0f172a; }
        .card-back { background: #4f46e5; color: white; transform: rotateY(180deg); }

        .card-symbol { font-size: 80px; font-weight: bold; margin: 0; }
        .card-reading { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
        .card-hint { font-size: 18px; color: #cbd5e1; text-align: center; }
        .tap-hint { position: absolute; bottom: 20px; font-size: 14px; color: #94a3b8; }

        .swipe-actions { display: flex; justify-content: space-between; width: 300px; margin-top: 40px; }
        .btn-swipe { 
            width: 70px; height: 70px; border-radius: 50%; border: none; 
            font-size: 30px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; transition: 0.2s;
        }
        .btn-swipe.left { background: #ef4444; color: white; }
        .btn-swipe.right { background: #10b981; color: white; }
        .btn-swipe:active { transform: scale(0.9); }

        /* =========================================
           РЕЖИМ 2: ОРДИНАРНЫЙ КВИЗ И ГРАММАТИКА
           ========================================= */
        #quiz-mode { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .progress-container { width: 100%; max-width: 400px; background: #334155; border-radius: 10px; height: 12px; overflow: hidden; margin-bottom: 20px; }
        .progress-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.4s ease-out; }

        .question-card {
            background: white; color: #0f172a; width: 100%; max-width: 400px;
            border-radius: 20px; padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; box-sizing: border-box; position: relative;
        }

        .symbol-container { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .symbol { font-size: 60px; font-weight: bold; margin: 0; color: #1e293b; }
        
        .speaker-btn {
            background: #e2e8f0; border-radius: 50%; width: 40px; height: 40px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; margin-left: 15px; transition: 0.2s;
        }
        .speaker-btn:active { transform: scale(0.9); background: #cbd5e1; }

        .blank-slot {
            display: inline-block; min-width: 50px; height: 40px; border-bottom: 3px solid #64748b;
            color: #4f46e5; font-weight: bold; vertical-align: bottom;
        }

        .question-text { font-size: 16px; color: #64748b; margin-top: 0; margin-bottom: 20px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; margin-top: 20px;}

        .btn-option {
            background: #f1f5f9; border: 2px solid #e2e8f0; color: #334155;
            font-size: 18px; font-weight: bold; padding: 15px 10px; border-radius: 15px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-option:active { transform: scale(0.95); }
        .btn-option.correct { background: #10b981; border-color: #059669; color: white; transform: scale(1.05); }
        .btn-option.wrong { background: #ef4444; border-color: #dc2626; color: white; }

        /* Экраны финала */
        #result-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        .claim-btn { background: #8b5cf6; color: white; font-size: 20px; font-weight: bold; border: none; padding: 15px 40px; border-radius: 15px; width: 100%; max-width: 300px; margin-top: 30px;}
        .claim-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #7c3aed; }
    </style>
</head>
<body>

    <div class="header" id="header-title">Загрузка...</div>

    <!-- РЕЖИМ СВАЙПОВ -->
    <div id="swipe-mode" class="hidden">
        <div class="card-stack" id="card-stack"></div>
        <div class="swipe-actions">
            <button class="btn-swipe left" onclick="swipeCard('left')">❌</button>
            <button class="btn-swipe right" onclick="swipeCard('right')">✅</button>
        </div>
    </div>

    <!-- РЕЖИМ КВИЗА / ГРАММАТИКИ -->
    <div id="quiz-mode" class="hidden">
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        
        <div class="question-card">
            <div class="symbol-container">
                <span class="symbol" id="symbol-display">...</span>
                <div class="speaker-btn" id="speaker-btn" onclick="speakText()">🔊</div>
            </div>
            <p class="question-text" id="hint-text">Выберите правильный перевод</p>
        </div>
        
        <div class="options-grid" id="options-container"></div>
    </div>

    <!-- ФИНАЛ -->
    <div id="result-screen" class="hidden">
        <div style="font-size: 80px;">🎉</div>
        <h2 style="margin:10px 0;">Урок завершен!</h2>
        <p style="color:#cbd5e1;" id="result-desc">Вы отлично справились</p>
        <button class="claim-btn" onclick="claimReward()">Забрать награду</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let appData = { mode: "quiz", items: [] };
        let currentIndex = 0;
        let score = 0;

        // Инициализация при запуске
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            // Читаем данные и из ?data=, и из ?d= (чтобы работало на 100%)
            const rawData = urlParams.get('d') || urlParams.get('data');
            const mode = urlParams.get('mode');
            
            if (rawData) {
                try {
                    // Расшифровываем JSON от Питона
                    appData.items = JSON.parse(decodeURIComponent(escape(atob(rawData))));
                    // Если мод не передан явно, определяем его по типу вопроса
                    appData.mode = mode || (appData.items[0].t ? "quiz" : "swipe");
                } catch(e) { 
                    alert("Ошибка загрузки данных. Пожалуйста, закройте и откройте заново."); 
                }
            } else {
                // ДЕФОЛТНЫЙ ТЕСТОВЫЙ НАБОР (Если открыть ссылку в браузере с ПК)
                appData.mode = 'quiz';
                appData.items = [
                    { t: "word", q: "水", a: ["Огонь", "Вода", "Дерево", "Земля"], c: 1 },
                    { t: "word", q: "ねこ", a: ["Собака", "Птица", "Кошка", "Рыба"], c: 2 },
                    { t: "grammar", q: "わたし ___ がくせい", a: ["を","は","に","で"], c: 1 }
                ];
            }

            if (appData.mode === 'swipe') initSwipeMode();
            else initQuizMode();
        };

        /* =========================================
           ОБЩЕЕ (ОЗВУЧКА И ФИНАЛ)
           ========================================= */
        function speakText() {
            const item = appData.items[currentIndex];
            let textToSpeak = item.q;
            if (item.t === "grammar") textToSpeak = textToSpeak.replace("___", "");
            
            const googleTTSUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(textToSpeak)}&tl=ja&client=tw-ob`;
            const audio = new Audio(googleTTSUrl);
            audio.play().catch(e => console.log("Браузер заблокировал аудио", e));
        }

        function showResults() {
            document.getElementById('swipe-mode').classList.add('hidden');
            document.getElementById('quiz-mode').classList.add('hidden');
            document.getElementById('header-title').classList.add('hidden');
            
            const resultScreen = document.getElementById('result-screen');
            resultScreen.classList.remove('hidden');
            document.getElementById('result-desc').innerText = `Счет: ${score} из ${appData.items.length}`;
        }

        function claimReward() {
            let safeMode = appData.mode || "quiz";
            tg.sendData(`${safeMode}_result_${score}`);
        }

        /* =========================================
           РЕЖИМ КВИЗА / ГРАММАТИКИ
           ========================================= */
        let isWaiting = false;

        function initQuizMode() {
            document.getElementById('quiz-mode').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Проверка знаний";
            renderQuizCard();
        }

        function renderQuizCard() {
            isWaiting = false;
            // Проверяем, не закончились ли вопросы
            if (currentIndex >= appData.items.length) { showResults(); return; }

            const item = appData.items[currentIndex];
            document.getElementById('progress-bar').style.width = ((currentIndex / appData.items.length) * 100) + "%";
            
            if (item.t === "grammar" || item.q.includes("___")) {
                document.getElementById('symbol-display').innerHTML = item.q.replace("___", `<span class="blank-slot" id="grammar-blank"></span>`);
                document.getElementById('hint-text').innerText = "Вставьте пропущенную частицу";
                document.getElementById('symbol-display').style.fontSize = "35px";
                document.getElementById('speaker-btn').style.display = "none";
            } else {
                document.getElementById('symbol-display').innerHTML = item.q;
                document.getElementById('hint-text').innerText = "Выберите правильный перевод";
                document.getElementById('symbol-display').style.fontSize = "60px";
                document.getElementById('speaker-btn').style.display = "inline-flex";
            }
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            let options = item.a || ["Ошибка"];
            
            options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isWaiting) return;
            isWaiting = true;
            
            const item = appData.items[currentIndex];
            const allButtons = document.querySelectorAll('.btn-option');
            
            if (item.t === "grammar" || item.q.includes("___")) {
                let blank = document.getElementById('grammar-blank');
                if (blank) blank.innerText = item.a[selectedIndex];
            }

            let isCorrect = false;
            if (item.c !== undefined) {
                isCorrect = (selectedIndex === item.c);
            } else {
                isCorrect = (selectedIndex === item.a.length - 1); 
            }

            if (isCorrect) {
                btnElement.classList.add("correct");
                score++;
                try { tg.HapticFeedback.notificationOccurred("success"); } catch(e){}
            } else {
                btnElement.classList.add("wrong");
                if (item.c !== undefined) allButtons[item.c].classList.add("correct");
                try { tg.HapticFeedback.notificationOccurred("error"); } catch(e){}
            }

            // Ждем 1 секунду и листаем дальше!
            setTimeout(() => {
                currentIndex++;
                renderQuizCard();
            }, 1000);
        }

        /* =========================================
           ЛОГИКА СВАЙПОВ (TINDER)
           ========================================= */
        let activeCard = null;

        function initSwipeMode() {
            document.getElementById('swipe-mode').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Свайп: Вправо-Помню, Влево-Забыл";
            renderCards();
        }

        function renderCards() {
            const stack = document.getElementById('card-stack');
            stack.innerHTML = "";
            
            for (let i = appData.items.length - 1; i >= currentIndex; i--) {
                const item = appData.items[i];
                const card = document.createElement('div');
                card.className = 'swipe-card';
                card.style.zIndex = appData.items.length - i;
                
                if (i === currentIndex) {
                    activeCard = card;
                    setupCardPhysics(card);
                } else {
                    card.style.transform = `scale(${1 - (i-currentIndex)*0.05}) translateY(${(i-currentIndex)*10}px)`;
                }

                card.innerHTML = `
                    <div class="card-front" onclick="flipCard(this.parentElement)">
                        <h1 class="card-symbol">${item.q}</h1>
                        <div class="tap-hint">Нажми, чтобы перевернуть</div>
                    </div>
                    <div class="card-back" onclick="flipCard(this.parentElement)">
                        <div class="card-reading">${item.r || "Японский"}</div>
                        <div class="card-hint">${item.t || "Перевод"}</div>
                    </div>
                `;
                stack.appendChild(card);
            }
        }

        function flipCard(card) {
            const currentRotation = card.style.transform;
            if (currentRotation.includes('rotateY(180deg)')) {
                card.style.transform = 'rotateY(0deg)';
            } else {
                card.style.transform = 'rotateY(180deg)';
                try { tg.HapticFeedback.impactOccurred("light"); } catch(e){}
            }
        }

        function setupCardPhysics(card) {
            let startX = 0, currentX = 0, isDragging = false;
            const onStart = (e) => {
                isDragging = true;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                card.style.transition = 'none';
            };
            const onMove = (e) => {
                if (!isDragging) return;
                currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].pageX) - startX;
                const isFlipped = card.style.transform.includes('rotateY');
                card.style.transform = `translate(${currentX}px, ${Math.abs(currentX)*0.1}px) rotate(${currentX*0.1}deg) ${isFlipped ? 'rotateY(180deg)' : ''}`;
            };
            const onEnd = () => {
                isDragging = false;
                card.style.transition = 'transform 0.3s ease';
                if (currentX > 100) swipeCard('right');
                else if (currentX < -100) swipeCard('left');
                else {
                    const isFlipped = card.style.transform.includes('rotateY');
                    card.style.transform = `translate(0px, 0px) rotate(0deg) ${isFlipped ? 'rotateY(180deg)' : ''}`;
                }
            };
            card.addEventListener('mousedown', onStart); document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
            card.addEventListener('touchstart', onStart, {passive: true}); document.addEventListener('touchmove', onMove, {passive: true}); document.addEventListener('touchend', onEnd);
        }

        function swipeCard(direction) {
            if (!activeCard) return;
            const flyX = direction === 'right' ? window.innerWidth : -window.innerWidth;
            activeCard.style.transition = 'transform 0.4s ease-out';
            activeCard.style.transform = `translate(${flyX}px, 100px) rotate(${direction==='right'?30:-30}deg)`;
            
            if (direction === 'right') { score++; try { tg.HapticFeedback.notificationOccurred("success"); } catch(e){} } 
            else { try { tg.HapticFeedback.notificationOccurred("error"); } catch(e){} }

            activeCard = null;
            setTimeout(() => {
                currentIndex++;
                if (currentIndex >= appData.items.length) showResults();
                else renderCards();
            }, 300);
        }
    </script>
</body>
</html>
