<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeleLingo Web</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; box-sizing: border-box; overflow: hidden;
        }

        .progress-container { width: 100%; max-width: 400px; background: #334155; border-radius: 10px; height: 12px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.4s ease-out; }

        .question-card {
            background: white; color: #0f172a; width: 100%; max-width: 400px;
            border-radius: 20px; padding: 30px 20px; margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; box-sizing: border-box; position: relative;
        }

        .symbol { font-size: 60px; font-weight: bold; margin: 0; color: #1e293b; display: inline-block;}
        
        .speaker-btn {
            background: #e2e8f0; border-radius: 50%; width: 40px; height: 40px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; vertical-align: middle; margin-left: 10px;
            transition: 0.2s;
        }
        .speaker-btn:active { transform: scale(0.9); background: #cbd5e1; }

        .blank-slot {
            display: inline-block; min-width: 50px; height: 40px; border-bottom: 3px solid #64748b;
            color: #4f46e5; font-weight: bold; vertical-align: bottom;
        }

        .question-text { font-size: 16px; color: #64748b; margin-top: 15px; margin-bottom: 25px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }

        .btn-option {
            background: #f1f5f9; border: 2px solid #e2e8f0; color: #334155;
            font-size: 18px; font-weight: bold; padding: 15px 10px; border-radius: 15px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-option:active { transform: scale(0.95); }
        .btn-option.correct { background: #10b981; border-color: #059669; color: white; transform: scale(1.05); }
        .btn-option.wrong { background: #ef4444; border-color: #dc2626; color: white; }

        #result-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        .trophy { font-size: 100px; }
        .score-text { font-size: 32px; font-weight: bold; margin: 20px 0; text-align: center; }
        .claim-btn { background: #8b5cf6; color: white; font-size: 20px; font-weight: bold; border: none; padding: 15px 40px; border-radius: 15px; width: 100%; max-width: 300px; box-shadow: 0 6px 0 #7c3aed; }
        .claim-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #7c3aed; }
    </style>
</head>
<body>

    <div id="quiz-screen" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        
        <div class="question-card">
            <div>
                <span class="symbol" id="symbol-display">...</span>
                <div class="speaker-btn" id="speaker-btn" onclick="speakText()">🔊</div>
            </div>
            <p class="question-text" id="hint-text">Выберите правильный перевод</p>
            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <div id="result-screen">
        <div class="trophy">🏆</div>
        <div class="score-text">Твой результат:<br><span id="final-score">0</span> из 5</div>
        <p style="color: #cbd5e1; margin-bottom: 40px;">Данные отправлены боту!</p>
        <button class="claim-btn" onclick="claimReward()">Забрать награду</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let isWaiting = false;

        function loadQuestions() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawData = urlParams.get('data');
            if (rawData) {
                try {
                    const jsonStr = decodeURIComponent(escape(atob(rawData)));
                    questions = JSON.parse(jsonStr);
                } catch (e) { alert("Ошибка загрузки"); }
            }
            if (questions.length === 0) {
                questions = [{ t: "word", q: "水", a: ["Огонь", "Вода", "Дерево", "Земля"], c: 1 }];
            }
            renderQuestion();
        }

        // === УМНАЯ ОЗВУЧКА (100% РАБОТАЕТ) ===
        function speakText() {
            const textToSpeak = questions[currentQuestion].q.replace("___", ""); 
            
            // Способ 1: Пытаемся использовать нативный голос (если он есть)
            if ('speechSynthesis' in window) {
                let voices = window.speechSynthesis.getVoices();
                let jpVoice = voices.find(v => v.lang.includes('ja'));
                
                if (jpVoice) {
                    let utterance = new SpeechSynthesisUtterance(textToSpeak);
                    utterance.voice = jpVoice;
                    utterance.lang = 'ja-JP';
                    window.speechSynthesis.speak(utterance);
                    return; // Успешно сказали, выходим
                }
            }
            
            // Способ 2: Надежный фоллбэк на Google Translate Audio (через скрытый Audio-объект)
            const googleTTSUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(textToSpeak)}&tl=ja&client=tw-ob`;
            const audio = new Audio(googleTTSUrl);
            audio.play().catch(e => console.log("Браузер заблокировал автоплей звука:", e));
        }

        function renderQuestion() {
            isWaiting = false;
            if (currentQuestion >= questions.length) { showResults(); return; }

            const qData = questions[currentQuestion];
            document.getElementById('progress-bar').style.width = ((currentQuestion / questions.length) * 100) + "%";
            
            if (qData.t === "grammar") {
                document.getElementById('symbol-display').innerHTML = qData.q.replace("___", "<span class='blank-slot' id='grammar-blank'></span>");
                document.getElementById('hint-text').innerText = "Вставьте пропущенную частицу";
                document.getElementById('symbol-display').style.fontSize = "35px";
                document.getElementById('speaker-btn').style.display = "none";
            } else {
                document.getElementById('symbol-display').innerHTML = qData.q;
                document.getElementById('hint-text').innerText = "Выберите правильный перевод";
                document.getElementById('symbol-display').style.fontSize = "60px";
                document.getElementById('speaker-btn').style.display = "inline-flex";
            }
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            qData.a.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isWaiting) return;
            isWaiting = true;
            
            const qData = questions[currentQuestion];
            const allButtons = document.querySelectorAll('.btn-option');
            
            if (qData.t === "grammar") document.getElementById('grammar-blank').innerText = qData.a[selectedIndex];

            if (selectedIndex === qData.c) {
                btnElement.classList.add("correct");
                score++;
                try { tg.HapticFeedback.notificationOccurred("success"); } catch(e){}
            } else {
                btnElement.classList.add("wrong");
                allButtons[qData.c].classList.add("correct");
                try { tg.HapticFeedback.notificationOccurred("error"); } catch(e){}
            }

            setTimeout(() => { currentQuestion++; renderQuestion(); }, 1200);
        }

        function showResults() {
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('quiz-screen').style.display = "none";
            document.getElementById('result-screen').style.display = "flex";
            document.getElementById('final-score').innerText = score;
        }

        function claimReward() { tg.sendData("quiz_result_" + score); }

        window.onload = loadQuestions;
    </script>
</body>
</html>
