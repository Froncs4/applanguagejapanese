<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeleLingo Web Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* === ПРЕМИУМ ФОН С ПАРАЛЛАКСОМ === */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden;
            color: white;
            background-color: #0f172a; /* Резервный цвет */
        }
        
        #parallax-bg {
            position: absolute;
            top: -5%; left: -5%;
            width: 110%; height: 110%; /* Чуть больше экрана для движения */
            background-image: url('https://images.unsplash.com/photo-1528164344705-47542687000d?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: transform 0.1s ease-out;
            filter: brightness(0.7) contrast(1.1); /* Слегка затемняем, чтобы текст читался */
        }

        /* Оверлей для дополнительного контраста */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%);
            z-index: -1;
        }

        .header { position: absolute; top: 30px; width: 100%; text-align: center; font-size: 22px; font-weight: 800; color: rgba(255,255,255,0.9); z-index: 10; text-shadow: 0 2px 10px rgba(0,0,0,0.5); letter-spacing: 1px;}
        .hidden { display: none !important; }

        /* Эффект матового стекла (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-radius: 30px; /* Очень сильное закругление */
        }

        /* === РЕЖИМ: СВАЙПЫ === */
        #swipe-mode { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .card-stack { position: relative; width: 320px; height: 440px; margin-top: 30px; perspective: 1200px; }
        .swipe-card {
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: grab; user-select: none;
        }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            box-sizing: border-box; padding: 20px;
        }
        /* Лицевая сторона - белое стекло, обратная - фиолетовое */
        .card-front { background: rgba(255,255,255,0.95); border-radius: 30px; color: #0f172a; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .card-back { background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 30px; color: white; transform: rotateY(180deg); box-shadow: 0 15px 35px rgba(99,102,241,0.4); }
        
        .card-symbol { font-size: 90px; font-weight: 900; margin: 0; }
        .card-reading { font-size: 36px; font-weight: bold; margin-bottom: 10px; }
        .card-hint { font-size: 20px; color: rgba(255,255,255,0.8); text-align: center; }
        .tap-hint { position: absolute; bottom: 25px; font-size: 15px; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;}

        /* === РЕЖИМ: КВИЗ И ГРАММАТИКА === */
        #quiz-mode { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-container { position: absolute; top: 75px; width: 85%; max-width: 350px; background: rgba(0,0,0,0.3); border-radius: 15px; height: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 15px;}
        
        .question-card { width: 90%; max-width: 360px; padding: 40px 20px; text-align: center; box-sizing: border-box; margin-top: 30px; }
        .symbol-container { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .symbol { font-size: 70px; font-weight: 800; margin: 0; color: white; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .speaker-btn { background: rgba(255,255,255,0.2); border-radius: 50%; width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; margin-left: 15px; transition: 0.2s; border: 1px solid rgba(255,255,255,0.4);}
        .speaker-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.4); }

        .blank-slot { display: inline-block; min-width: 60px; height: 50px; border-bottom: 4px solid rgba(255,255,255,0.8); color: #fcd34d; font-weight: bold; vertical-align: bottom; transition: 0.3s;}
        .question-text { font-size: 18px; color: rgba(255,255,255,0.7); margin-top: 5px; margin-bottom: 10px; font-weight: 500;}
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 360px; margin-top: 25px;}
        .btn-option { background: rgba(255,255,255,0.85); border: 2px solid transparent; color: #1e293b; font-size: 20px; font-weight: 800; padding: 18px 10px; border-radius: 20px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .btn-option:active { transform: scale(0.92); }
        .btn-option.correct { background: #10b981; color: white; transform: scale(1.05); box-shadow: 0 10px 25px rgba(16,185,129,0.5);}
        .btn-option.wrong { background: #ef4444; color: white; }

        /* === РЕЖИМ: ГОЛОСОВАЯ КОМНАТА ИИ (ИСПРАВЛЕННЫЙ CSS) === */
        #voice-mode { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .ai-avatar { font-size: 110px; animation: float 4s ease-in-out infinite; margin-bottom: 20px; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));}
        
        .transcription-box { width: 85%; max-width: 350px; min-height: 80px; padding: 25px; text-align: center; font-size: 20px; font-weight: 500; color: white; margin-bottom: 30px; display: flex; align-items: center; justify-content: center;}
        
        /* Рация-микрофон (Чистый круг без багованных теней) */
        .mic-wrapper { position: relative; width: 120px; height: 120px; margin-top: 20px; }
        
        .mic-btn { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            border-radius: 50%; background: linear-gradient(135deg, #ef4444, #dc2626); 
            color: white; font-size: 50px; border: none; 
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5); 
            display: flex; justify-content: center; align-items: center; z-index: 10;
            user-select: none; -webkit-user-select: none; /* Защита от выделения текста при зажатии */
            transition: transform 0.1s;
        }
        
        /* Эффект при ЗАЖАТИИ кнопки (Рация активна) */
        .mic-btn.listening { 
            transform: scale(0.9); 
            background: linear-gradient(135deg, #10b981, #059669); 
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5); 
        }

        .helper-text { margin-top: 40px; color: #cbd5e1; font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}


        /* === РЕЖИМ: КОЛЕСО ФОРТУНЫ === */
        #wheel-mode { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .wheel-container { position: relative; width: 300px; height: 300px; margin-bottom: 50px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));}
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid rgba(255,255,255,0.9); transition: transform 4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: conic-gradient( #ef4444 0 90deg, #f59e0b 90deg 180deg, #10b981 180deg 270deg, #3b82f6 270deg 360deg ); position: relative; overflow: hidden; }
        .slice-text { position: absolute; font-weight: 900; font-size: 28px; text-shadow: 0 3px 6px rgba(0,0,0,0.6); color: white;}
        .slice-1 { top: 30px; right: 70px; transform: rotate(45deg); }
        .slice-2 { bottom: 70px; right: 20px; transform: rotate(135deg); }
        .slice-3 { bottom: 30px; left: 70px; transform: rotate(225deg); }
        .slice-4 { top: 70px; left: 20px; transform: rotate(315deg); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 50px; color: white; z-index: 10; text-shadow: 0 5px 15px rgba(0,0,0,0.6);}
        .spin-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; border: none; padding: 20px 60px; border-radius: 30px; font-size: 26px; font-weight: 900; cursor: pointer; box-shadow: 0 15px 30px rgba(245,158,11,0.4); transition: 0.2s;}
        .spin-btn:active { transform: translateY(8px); box-shadow: 0 5px 15px rgba(245,158,11,0.4); }

        /* ФИНАЛ */
        #result-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        
        @keyframes float { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-25px);} }
        @keyframes pulse-ring { 0% {transform: scale(1); opacity: 1;} 100% {transform: scale(1.5); opacity: 0;} }
    </style>
</head>
<body>
    <!-- Задний фон с Фудзи -->
    <div id="parallax-bg"></div>
    <div class="overlay"></div>

    <div class="header" id="header-title">Загрузка...</div>

    <!-- 1. СВАЙПЫ -->
    <div id="swipe-mode" class="hidden">
        <div class="card-stack" id="card-stack"></div>
    </div>

    <!-- 2. КВИЗ / ГРАММАТИКА -->
    <div id="quiz-mode" class="hidden">
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="question-card glass-panel">
            <div class="symbol-container">
                <span class="symbol" id="symbol-display">...</span>
                <div class="speaker-btn" id="speaker-btn" onclick="speakText()">🔊</div>
            </div>
            <p class="question-text" id="hint-text">Выберите правильный перевод</p>
        </div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <!-- 3. ГОЛОСОВАЯ КОМНАТА ИИ -->
    <div id="voice-mode" class="hidden">
        <div class="ai-avatar">🦊</div>
        <div class="transcription-box glass-panel" id="t-box">Нажми на микрофон и задай вопрос!</div>
        <button class="mic-btn" id="mic" onclick="toggleMic()">🎙</button>
        <button class="send-ai-btn" id="send-ai" onclick="sendToAI()">Отправить Сенсею</button>
    </div>

    <!-- 4. КОЛЕСО ФОРТУНЫ -->
    <div id="wheel-mode" class="hidden">
        <div class="wheel-container">
            <div class="pointer">▼</div>
            <div class="wheel" id="wheel">
                <div class="slice-text slice-1">10 XP</div><div class="slice-text slice-2">50 XP</div>
                <div class="slice-text slice-3">0 XP</div><div class="slice-text slice-4">100 XP</div>
            </div>
        </div>
        <button class="spin-btn" id="spin-btn" onclick="spin()">Крутить!</button>
    </div>

    <!-- ФИНАЛ -->
    <div id="result-screen" class="hidden">
        <div style="font-size: 100px; animation: float 3s infinite;">🎉</div>
        <h2 style="font-size: 40px; margin: 10px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Завершено!</h2>
        <p style="font-size: 22px; color: rgba(255,255,255,0.8);" id="result-desc"></p>
        <button class="send-ai-btn" style="display:block; margin-top:30px; width:80%; max-width:300px;" onclick="claimReward()">Забрать награду</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // --- ПАРАЛЛАКС ЭФФЕКТ ДЛЯ ФОНА ---
        document.addEventListener('mousemove', (e) => {
            const bg = document.getElementById('parallax-bg');
            const x = (e.clientX / window.innerWidth - 0.5) * 20; // 20px сдвиг
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            bg.style.transform = `translate(${-x}px, ${-y}px)`;
        });

        // (Код словарей сокращен для удобства, используем тот же метод)
        const DICT_KANJI = {"一":"один", "二":"два", "三":"три", "四":"четыре", "五":"пять", "日":"день", "月":"месяц", "火":"огонь", "水":"вода", "木":"дерево", "金":"золото", "土":"земля", "人":"человек", "大":"большой", "小":"маленький"};
        const DICT_WORDS = {"こんにちは":"здравствуйте", "ありがとう":"спасибо", "さようなら":"до свидания", "たべる":"кушать", "のむ":"пить", "いく":"идти", "くる":"приходить", "ねこ":"кошка", "いぬ":"собака", "くるま":"машина", "ほん":"книга", "みず":"вода"};
        const DICT_GRAMMAR = {"わたし ___ がくせい です": "は", "りんご ___ たべる": "を", "がっこう ___ いく": "に", "ペン ___ かきます": "で", "いぬ ___ ねこ が います": "と", "あそこ ___ あります": "に", "だれ ___ きますか": "が", "としょかん ___ ほんをよむ": "で"};

        let appData = { mode: "quiz", items: [] };
        let currentIndex = 0, score = 0;

        function generateQuestions(mode) {
            let items = [];
            const shuffle = (arr) => arr.sort(() => 0.5 - Math.random());
            if (mode === 'swipe') {
                let keys = shuffle(Object.keys(DICT_KANJI)).slice(0, 5);
                items = keys.map(k => ({ q: k, r: "Кандзи", t: DICT_KANJI[k] }));
            } else if (mode === 'grammar') {
                let keys = shuffle(Object.keys(DICT_GRAMMAR)).slice(0, 5);
                let particles = ["は", "を", "に", "で", "が", "と", "も"];
                items = keys.map(k => {
                    let c = DICT_GRAMMAR[k];
                    let opts = shuffle(particles.filter(p => p !== c)).slice(0, 3);
                    opts.push(c); opts = shuffle(opts);
                    return { t: "grammar", q: k, a: opts, c: opts.indexOf(c) };
                });
            } else {
                let keys = shuffle(Object.keys(DICT_WORDS)).slice(0, 5);
                let allVals = Object.values(DICT_WORDS);
                items = keys.map(k => {
                    let c = DICT_WORDS[k];
                    let opts = shuffle(allVals.filter(v => v !== c)).slice(0, 3);
                    opts.push(c); opts = shuffle(opts);
                    return { t: "word", q: k, a: opts, c: opts.indexOf(c) };
                });
            }
            return items;
        }

        window.onload = () => {
            const mode = new URLSearchParams(window.location.search).get('mode') || 'quiz';
            appData.mode = mode;
            if (mode === 'voice') initVoice();
            else if (mode === 'wheel') initWheel();
            else {
                appData.items = generateQuestions(mode);
                if (mode === 'swipe') initSwipeMode();
                else initQuizMode();
            }
        };

        // ==========================================
        // ЛОГИКА ГОЛОСОВОГО ИИ (ИСПРАВЛЕНО И УЛУЧШЕНО)
        // ==========================================
        let recognition;
        let finalTranscript = "";

        function initVoice() {
            document.getElementById('voice-mode').classList.remove('hidden');
            document.getElementById('header-title').innerText = "Разговор с Акирой";
            
            // Инициализация Web Speech API
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                // БАГФИКС: Меняем на русский, чтобы общаться с Сенсеем и просить советы!
                recognition.lang = 'ru-RU'; 
                recognition.interimResults = true;
                
                recognition.onstart = () => {
                    document.getElementById('mic').classList.add('listening');
                    document.getElementById('t-box').innerText = "Слушаю вас...";
                    document.getElementById('send-ai').style.display = 'none';
                    try { tg.HapticFeedback.impactOccurred("medium"); } catch(e){}
                };

                recognition.onresult = (event) => {
                    let text = Array.from(event.results).map(r => r[0].transcript).join("");
                    document.getElementById('t-box').innerText = text;
                    if (event.results[0].isFinal) finalTranscript = text;
                };

                recognition.onend = () => {
                    // Как только вы замолкаете, микрофон выключается сам!
                    document.getElementById('mic').classList.remove('listening');
                    if (finalTranscript.trim().length > 0) {
                        document.getElementById('send-ai').style.display = 'block';
                    } else {
                        document.getElementById('t-box').innerText = "Нажмите микрофон и задайте вопрос!";
                    }
                };
                
                recognition.onerror = (event) => {
                    document.getElementById('mic').classList.remove('listening');
                    document.getElementById('t-box').innerText = "Ошибка: " + event.error;
                };
            } else {
                document.getElementById('t-box').innerText = "Браузер не поддерживает микрофон 😔";
            }
        }

        function toggleMic() {
            if (!recognition) return;
            // Убрали сложную логику on/off. Один клик = один старт записи!
            finalTranscript = "";
            try {
                recognition.start();
            } catch (e) {
                // Если случайно нажали дважды, игнорируем
            }
        }

        function sendToAI() { 
            if (finalTranscript.trim().length > 0) {
                // БАГФИКС 2: Очищаем текст от переносов строк и спецсимволов, которые ломают sendData
                let safeText = finalTranscript.replace(/[\n\r]/g, ' ').replace(/[#_*\[\]]/g, '');
                safeText = safeText.substring(0, 150); // Увеличили лимит до 150 символов
                
                // Чтобы 100% не сломать sendData, кодируем в uri-формат
                let payload = "voice_query_" + encodeURIComponent(safeText);
                tg.sendData(payload); 
            }
        }


        // ==========================================
        // ОСТАЛЬНАЯ ЛОГИКА (РУЛЕТКА, КВИЗ) ОСТАЛАСЬ ТАКОЙ ЖЕ
        // ==========================================
        function initWheel() { document.getElementById('wheel-mode').classList.remove('hidden'); document.getElementById('header-title').innerText = "Ежедневная рулетка"; }
        function spin() {
            document.getElementById('spin-btn').style.display = "none";
            let randomDeg = Math.floor(Math.random() * 360), totalDeg = 1440 + randomDeg; 
            document.getElementById('wheel').style.transform = `rotate(${totalDeg}deg)`;
            try { tg.HapticFeedback.impactOccurred("heavy"); } catch(e){}
            setTimeout(() => {
                let actualDeg = (360 - (randomDeg % 360)) % 360;
                let prize = (actualDeg < 90) ? 10 : (actualDeg < 180) ? 50 : (actualDeg < 270) ? 0 : 100;
                tg.sendData("wheel_reward_" + prize);
            }, 4200);
        }

        function speakText() {
            let textToSpeak = appData.items[currentIndex].q.replace("___", "");
            new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(textToSpeak)}&tl=ja&client=tw-ob`).play().catch(e=>e);
        }

        function showResults() {
            document.querySelectorAll('.hidden').forEach(el => el.classList.add('hidden'));
            document.getElementById('swipe-mode').classList.add('hidden'); document.getElementById('quiz-mode').classList.add('hidden'); document.getElementById('header-title').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-desc').innerText = `Верных ответов: ${score} из ${appData.items.length}`;
        }
        function claimReward() { tg.sendData(`${appData.mode}_result_${score}`); }

        let isWaiting = false;
        function initQuizMode() { document.getElementById('quiz-mode').classList.remove('hidden'); document.getElementById('header-title').innerText = appData.mode === 'grammar' ? "Интерактивная Грамматика" : "Проверка знаний"; renderQuizCard(); }
        function renderQuizCard() {
            isWaiting = false; if (currentIndex >= appData.items.length) { showResults(); return; }
            const item = appData.items[currentIndex];
            document.getElementById('progress-bar').style.width = ((currentIndex / appData.items.length) * 100) + "%";
            
            if (item.t === "grammar") {
                document.getElementById('symbol-display').innerHTML = item.q.replace("___", `<span class="blank-slot" id="grammar-blank"></span>`);
                document.getElementById('hint-text').innerText = "Вставьте пропущенную частицу";
                document.getElementById('symbol-display').style.fontSize = "38px";
                document.getElementById('speaker-btn').style.display = "none";
            } else {
                document.getElementById('symbol-display').innerHTML = item.q;
                document.getElementById('hint-text').innerText = "Выберите правильный перевод";
                document.getElementById('symbol-display').style.fontSize = "70px";
                document.getElementById('speaker-btn').style.display = "inline-flex";
            }
            const container = document.getElementById('options-container'); container.innerHTML = "";
            item.a.forEach((opt, index) => {
                const btn = document.createElement("button"); btn.className = "btn-option"; btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn); container.appendChild(btn);
            });
        }
        function checkAnswer(selectedIndex, btnElement) {
            if (isWaiting) return; isWaiting = true;
            const item = appData.items[currentIndex]; const allButtons = document.querySelectorAll('.btn-option');
            if (item.t === "grammar") document.getElementById('grammar-blank').innerText = item.a[selectedIndex];
            if (selectedIndex === item.c) { btnElement.classList.add("correct"); score++; try { tg.HapticFeedback.notificationOccurred("success"); } catch(e){} } 
            else { btnElement.classList.add("wrong"); allButtons[item.c].classList.add("correct"); try { tg.HapticFeedback.notificationOccurred("error"); } catch(e){} }
            setTimeout(() => { currentIndex++; renderQuizCard(); }, 1200);
        }

        let activeCard = null;
        function initSwipeMode() { document.getElementById('swipe-mode').classList.remove('hidden'); document.getElementById('header-title').innerText = "Свайп: Вправо-Помню, Влево-Забыл"; renderCards(); }
        function renderCards() {
            const stack = document.getElementById('card-stack'); stack.innerHTML = "";
            for (let i = appData.items.length - 1; i >= currentIndex; i--) {
                const item = appData.items[i]; const card = document.createElement('div'); card.className = 'swipe-card'; card.style.zIndex = appData.items.length - i;
                if (i === currentIndex) { activeCard = card; setupCardPhysics(card); } else card.style.transform = `scale(${1 - (i-currentIndex)*0.05}) translateY(${(i-currentIndex)*10}px)`;
                card.innerHTML = `<div class="card-front" onclick="flipCard(this.parentElement)"><h1 class="card-symbol">${item.q}</h1><div class="tap-hint">Нажми, чтобы перевернуть</div></div><div class="card-back" onclick="flipCard(this.parentElement)"><div class="card-reading">${item.r}</div><div class="card-hint">${item.t}</div></div>`;
                stack.appendChild(card);
            }
        }
        function flipCard(card) {
            if (card.style.transform.includes('rotateY(180deg)')) card.style.transform = 'rotateY(0deg)';
            else { card.style.transform = 'rotateY(180deg)'; try { tg.HapticFeedback.impactOccurred("light"); } catch(e){} }
        }
        function setupCardPhysics(card) {
            let startX = 0, currentX = 0, isDragging = false;
            const onStart = (e) => { isDragging = true; startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX; card.style.transition = 'none'; };
            const onMove = (e) => { if (!isDragging) return; currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].pageX) - startX; const isFlipped = card.style.transform.includes('rotateY'); card.style.transform = `translate(${currentX}px, ${Math.abs(currentX)*0.1}px) rotate(${currentX*0.1}deg) ${isFlipped ? 'rotateY(180deg)' : ''}`; };
            const onEnd = () => {
                isDragging = false; card.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                if (currentX > 100) swipeCard('right'); else if (currentX < -100) swipeCard('left');
                else { const isFlipped = card.style.transform.includes('rotateY'); card.style.transform = `translate(0px, 0px) rotate(0deg) ${isFlipped ? 'rotateY(180deg)' : ''}`; }
            };
            card.addEventListener('mousedown', onStart); document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
            card.addEventListener('touchstart', onStart, {passive: true}); document.addEventListener('touchmove', onMove, {passive: true}); document.addEventListener('touchend', onEnd);
        }
        function swipeCard(direction) {
            if (!activeCard) return;
            const flyX = direction === 'right' ? window.innerWidth : -window.innerWidth;
            activeCard.style.transition = 'transform 0.4s ease-out'; activeCard.style.transform = `translate(${flyX}px, 100px) rotate(${direction==='right'?30:-30}deg)`;
            if (direction === 'right') { score++; try { tg.HapticFeedback.notificationOccurred("success"); } catch(e){} } else try { tg.HapticFeedback.notificationOccurred("error"); } catch(e){}
            activeCard = null; setTimeout(() => { currentIndex++; if (currentIndex >= appData.items.length) showResults(); else renderCards(); }, 300);
        }
    </script>
</body>
</html>
